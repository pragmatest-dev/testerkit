config:
  - litmus_limits:
      v_rail: {low: 3.2, high: 3.4, units: V}
      v_overvoltage: {low: 4.0, high: 5.0, units: V}    # OVP-band; lets the litmus_mock demo prove itself

tests:
  TestIdle:
    config:
      - litmus_limits:
          i_idle: {low: 0.0, high: 0.1, units: A}

  test_rail_holds_across_input:
    config:
      - litmus_vectors:
          - {vin: [3.3, 5.0, 5.5]}

  test_ovp_path_sidecar:
    config:
      - litmus_mock: {target: dmm.measure_dc_voltage, return_value: 4.5}

  test_operator_choice_sidecar:
    config:
      - litmus_prompt:
          pick_fixture:
            message: "Pick a fixture variant"
            prompt_type: choice
            choices: [bench_01, bench_02]
