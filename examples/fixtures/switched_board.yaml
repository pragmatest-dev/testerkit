id: switched_board_fixture_v1
name: Switched Board Test Fixture
description: >
  Fixture with relay matrix switching. A single DMM is shared across
  multiple measurement points via a switch matrix. The PSU is direct-wired.
product_id: power_board

points:
  # Direct-wired supply — no switching needed
  vin_supply:
    name: vin_supply
    dut_pin: J1_VIN
    net: VIN_5V
    instrument: psu
    instrument_channel: CH1
    instrument_terminal: hi
    description: 5V input from PSU (direct-wired)

  # Switched measurement points — DMM routed through matrix
  vout_measure:
    name: vout_measure
    dut_pin: VOUT
    net: VOUT_3V3
    instrument: dmm
    instrument_channel: "1"
    instrument_terminal: hi
    description: Output voltage via DMM through switch matrix
    route:
      switch: matrix
      channels: ["r0c0"]
      settling_ms: 10

  iout_measure:
    name: iout_measure
    dut_pin: IOUT
    net: IOUT_SENSE
    instrument: dmm
    instrument_channel: "1"
    instrument_terminal: hi
    description: Output current sense via DMM through switch matrix
    route:
      switch: matrix
      channels: ["r1c0"]
      settling_ms: 10

  vref_measure:
    name: vref_measure
    dut_pin: VREF
    net: VREF_1V2
    instrument: dmm
    instrument_channel: "1"
    instrument_terminal: hi
    description: Reference voltage via DMM through switch matrix
    route:
      switch: matrix
      channels: ["r2c0"]
      settling_ms: 5
