[pytest]
# --mock-instruments default-on so the demo runs without hardware. The
# `psu` / `dmm` fixtures in conftest.py wrap the real driver classes
# (drivers/psu.py, drivers/dmm.py) in Litmus's Mock factory when this
# flag is set. Drop it or pass --no-mock-instruments once a bench is
# attached.
addopts = --mock-instruments
