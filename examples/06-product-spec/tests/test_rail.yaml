# Per-test spec markers + limits that reference product characteristics.
tests:
  test_rail_within_spec:
    config:
      - litmus_spec: {characteristic: rail_3v3}
      - litmus_limits:
          v_rail: {characteristic: rail_3v3, tolerance_pct: 2}

  test_rail_holds_across_input:
    config:
      - litmus_vectors:
          - {vin: [3.3, 5.0, 5.5]}
      - litmus_spec: {characteristic: rail_3v3}
      - litmus_limits:
          v_rail: {characteristic: rail_3v3, tolerance_pct: 2}

  TestIdle:
    config:
      - litmus_spec: {characteristic: rail_3v3}
      - litmus_limits:
          v_rail: {characteristic: rail_3v3, tolerance_pct: 2}
          i_idle: {characteristic: idle_current, tolerance_pct: 20}
