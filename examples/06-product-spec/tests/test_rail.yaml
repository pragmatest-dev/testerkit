# Per-test spec bindings + limits that reference product characteristics.
tests:
  test_rail_within_spec:
    specs: [rail_3v3]
    connections: {connections: [vout_measure]}    # narrow the auto-derived pin set; redundant for a single-pin char but shows the field
    limits:
      v_rail: {characteristic: rail_3v3, tolerance_pct: 2}

  test_rail_holds_across_input:
    sweeps:
      - {vin: [3.3, 5.0, 5.5]}
    specs: [rail_3v3]
    limits:
      v_rail: {characteristic: rail_3v3, tolerance_pct: 2}

  TestIdle:
    specs: [rail_3v3]
    limits:
      v_rail: {characteristic: rail_3v3, tolerance_pct: 2}
      i_idle: {characteristic: idle_current, tolerance_pct: 20}
