id: buck_3v3
part_number: DEMO-BUCK-3V3
name: Demo 3.3 V Buck Converter
revision: A
description: 5 V to 3.3 V buck converter, 500 mA max.

# Pins exposed by the DUT. Each has a human-facing name (PCB label)
# and a net the fixture can route.
pins:
  TP_VIN:
    name: TP1
    net: VIN_5V
  TP_VOUT:
    name: TP2
    net: VOUT_3V3
  TP_GND:
    name: TP3
    net: GND

# Characteristics are named specs. Tests reference them by id; limits
# derive from the declared value plus a tolerance.
characteristics:
  input_voltage:
    function: dc_voltage
    direction: input
    units: V
    pin: TP_VIN
    specs:
      - value: 5.0

  rail_3v3:
    function: dc_voltage
    direction: output
    units: V
    pin: TP_VOUT
    specs:
      - value: 3.3

  idle_current:
    function: dc_current
    direction: input
    units: A
    pin: TP_VIN
    specs:
      - value: 0.05
