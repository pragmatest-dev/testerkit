# Sidecar is bench-fact only: which characteristic each test binds to.
# Limits and parametrize now come from the selected profile (see
# profiles/*.yaml) so they can vary per phase without touching this file.
# TestIdle has no phase-specific variation so it keeps its limits here.
tests:
  test_rail_within_spec:
    config:
      - litmus_specs: [rail_3v3]

  test_rail_holds_across_input:
    config:
      - litmus_specs: [rail_3v3]

  TestIdle:
    config:
      - litmus_specs: [rail_3v3]
      - litmus_limits:
          v_rail: {characteristic: rail_3v3, tolerance_pct: 2}
          i_idle: {characteristic: idle_current, tolerance_pct: 20}
