# Characterization — wide sweep, no limits (record-only).
#
# verify_requires_limit: false makes verify() with no resolved limit
# fall back to measure() semantics (Outcome.DONE) instead of
# raising MissingLimitError. The same test code that judges in the
# dev/production profiles records data in this one.
facets:
  test_phase: characterization
station_type: bench
verify_requires_limit: false
tests:
  test_rail_holds_across_input:
    sweeps:
      - {vin: [3.0, 3.3, 3.6, 4.0, 4.5, 5.0, 5.5, 6.0]}
