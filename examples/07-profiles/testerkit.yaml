name: profiles-example
data_dir: data   # keep example data local — don't pollute global
default_station: bench_01
default_fixture: buck_3v3_bench
mock_instruments: true

# When several profiles are declared, bare ``pytest`` (no facet flags,
# no --test-profile) needs a tiebreaker. ``default_profile`` is what
# applies in that case. Pass --no-test-profile to skip profile resolution
# entirely, or pass facet flags / --test-profile to select one.
default_profile: development
