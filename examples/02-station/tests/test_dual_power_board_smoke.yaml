# Dual-DUT power board smoke config (fixture slots in the station YAML).
vectors:
  methods:
    test_power_up:
      list:
        - {vin: 5.0}
    test_output_voltage_synced:
      list:
        - {vin: 5.0, load: 0.1, temperature: 25}
    test_efficiency:
      list:
        - {vin: 5.0, load: 0.5}
tests:
  test_efficiency:
    # Station default mock returns i_in=0.25 A → 132% (fails 66% spec).
    # Override to a realistic draw that yields ~66% efficiency.
    mocks:
      psu.measure_current: 0.5
limits:
  startup_current:
    high: 50
    nominal: 5
    units: mA
    comparator: LE
  efficiency: {ref: efficiency}
  output_voltage: {ref: output_voltage}
