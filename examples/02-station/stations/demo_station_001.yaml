id: demo_station_001
name: Demo Test Station
station_type: bench
location: Virtual Lab
description: Mock station for demonstrating Litmus capabilities
instruments:
  psu:
    type: psu
    driver: drivers.PSU
    resource: TCPIP::192.168.1.101::INSTR
    catalog_ref: generic_psu
    mock: true
    description: Generic dual-output power supply
    mock_config:
      measure_voltage: 5.0
      measure_current: 0.25
      set_voltage: 5.0
      set_current: 0.5
  dmm:
    type: dmm
    driver: drivers.DMM
    resource: TCPIP::192.168.1.102::INSTR
    catalog_ref: generic_dmm
    mock: true
    description: Generic digital multimeter
    mock_config:
      measure_voltage: 3.3
      measure_dc_voltage: 3.3
      measure_current: 0.0
      measure_dc_current: 0.0
      measure_resistance: 1000.0
  eload:
    type: eload
    driver: drivers.ELoad
    resource: TCPIP::192.168.1.103::INSTR
    catalog_ref: generic_eload
    mock: true
    description: Generic electronic load
    mock_config:
      measure_current: 0.5
      measure_voltage: 3.3
      set_current: 0.5
supported_phases:
  - validation
  - production
  - debug
