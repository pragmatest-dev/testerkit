# Sibling sidecar: every marker that decorated a test in stage 3 now
# lives here as a YAML entry. Same vocabulary (litmus_vectors,
# litmus_limits, litmus_retry), same merge semantics.

# File-wide: applied to every test in test_rail.py.
config:
  - litmus_limits:
      v_rail: {low: 3.2, high: 3.4, units: V}

# tests: mirrors pytest's node-id structure. A class is a branch with
# its own config (applied to every nested method) plus a nested
# tests: dict; a function is a leaf.
tests:
  TestIdle:
    config:
      - litmus_limits:
          i_idle: {low: 0.0, high: 0.1, units: A}

  test_rail_holds_across_input:
    config:
      - litmus_vectors:
          - {vin: [3.3, 5.0, 5.5]}

  test_intermittent_glitch:
    config:
      - litmus_retry: {max_attempts: 3, delay: 0.05}
