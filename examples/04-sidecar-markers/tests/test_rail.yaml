# Sibling sidecar: every marker that decorated a test in stage 3 now
# lives here as a YAML entry. Same vocabulary (sweeps, limits, retry),
# same merge semantics.

# File-wide: applied to every test in test_rail.py.
limits:
  v_rail: {low: 3.2, high: 3.4, unit: V}

# tests: mirrors pytest's node-id structure. A class is a branch with
# its own marker fields (applied to every nested method) plus a
# nested tests: dict; a function is a leaf. TesterKit marker fields
# (limits, sweeps, mocks, specs, connections, retry, prompts) live
# at each entry's root, alongside the reserved `runner:` and `tests:`
# keys.
tests:
  TestIdle:
    limits:
      i_idle: {low: 0.0, high: 0.1, unit: A}

  test_rail_holds_across_input:
    sweeps:
      - {vin: [3.3, 5.0, 5.5]}

  test_intermittent_glitch:
    retry: {max_retries: 2, delay: 0.05}
