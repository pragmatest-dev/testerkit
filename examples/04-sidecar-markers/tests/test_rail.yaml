# Sibling sidecar: every marker that decorated a test in stage 3 now
# lives here as a YAML entry. Same vocabulary (parametrize,
# litmus_limits), same merge semantics.

# File-wide: applied to every test in test_rail.py.
markers:
  - litmus_limits:
      v_rail: {low: 3.2, high: 3.4, units: V}

# Class-scoped: applied to every method of TestIdle.
classes:
  TestIdle:
    markers:
      - litmus_limits:
          i_idle: {low: 0.0, high: 0.1, units: A}

# Per-test: qualified name avoids collisions with TestIdle methods.
tests:
  test_rail_holds_across_input:
    markers:
      - parametrize: ["vin", [3.3, 5.0, 5.5]]
