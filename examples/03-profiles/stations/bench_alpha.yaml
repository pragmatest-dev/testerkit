# Station: bench_alpha — references catalog/ entries via catalog_ref.
#
# Each instrument block ties a role (psu/dmm/eload) to:
#   * A catalog_ref (universal capability data — see catalog/)
#   * A driver class (the project's wrapper code)
#   * A resource string (real) or mock=true (simulated)
#   * mock_config values returned by the mocked driver methods
id: bench_alpha
name: Bench Alpha — PMIC Characterization Station
station_type: bench
location: Lab B, rack 4
description: 6.5-digit DMM, triple PSU, 3-channel ELoad — user-maintained catalog.

instruments:
  psu:
    type: psu
    driver: examples.drivers.PSU
    resource: TCPIP::10.0.2.11::INSTR
    catalog_ref: keysight_e36313a
    mock: true
    # Default readings when the DUT is powered but lightly loaded.
    # Per-test sidecar `mocks:` override these for load/sweep scenarios.
    mock_config:
      measure_voltage: 5.00
      measure_current: 0.0025
  dmm:
    type: dmm
    driver: examples.drivers.DMM
    resource: TCPIP::10.0.2.12::INSTR
    catalog_ref: keysight_34465a
    mock: true
    # Default to the 3V3 rail nominal; tests that read other rails
    # override via sidecar `mocks:` (e.g. test_rail_1v8).
    mock_config:
      measure_dc_voltage: 3.300
      measure_voltage: 3.300
      measure_dc_current: 0.0025
      measure_current: 0.0025
  eload:
    type: eload
    driver: examples.drivers.ELoad
    resource: TCPIP::10.0.2.13::INSTR
    catalog_ref: chroma_63103a
    mock: true
    mock_config:
      measure_current: 0.1
      measure_voltage: 3.300

supported_phases:
  - validation
  - production
  - characterization
