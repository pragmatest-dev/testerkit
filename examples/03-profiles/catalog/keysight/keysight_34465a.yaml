# User-maintained catalog entry for the Keysight 34465A 6.5-digit DMM.
# Referenced from stations/bench_alpha.yaml via `catalog_ref: keysight_34465a`.
id: keysight_34465a
manufacturer: Keysight
model: "34465A"
name: Keysight 34465A 6.5-Digit Truevolt DMM
description: Bench DMM used for rail voltage and quiescent-current measurements.
type: dmm
interfaces: [lan, usb, gpib]
driver: drivers.DMM
channels:
  "1":
    terminals: [hi, lo]
    connector: binding_post
    ground: shared
capabilities:
  - function: dc_voltage
    direction: input
    signals:
      voltage: {range: {min: 0.0001, max: 1000, units: V}}
  - function: dc_current
    direction: input
    signals:
      current: {range: {min: 0.000001, max: 10, units: A}}
  - function: resistance
    direction: input
    signals:
      resistance: {range: {min: 0.01, max: 100000000, units: ohm}}
