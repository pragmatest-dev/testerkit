# Sidecar for test_power_on.py.
#
# Layer 2 — config — binds the test's free-form measurement labels to
# product characteristics (Layer 3) and supplies per-test vector inputs.
# Station mock_config defaults already match the nominal case for every
# test here (5.0 V supply, 2.5 mA quiescent, 3.300 V on the 3V3 rail),
# so no mocks overrides are needed.
vectors:
  methods:
    test_power_up:
      list:
        - {vin: 5.0}
    # Vector params double as spec-condition keys. quiescent_current's
    # SpecBand is gated on `load == 0`, so the vector must declare it
    # — absent, the resolver has no way to pick a band.
    test_quiescent_current:
      list:
        - {load: 0.0}
    test_rail_3v3_nominal:
      list:
        - {load: 0.1}

limits:
  # Procedural check — no product spec, absolute bounds only. Absolute
  # limits still stamp value/outcome; spec_ref stays null (no char).
  vin_applied:
    low: 4.95
    high: 5.05
    nominal: 5.0
    units: V

  # Product-spec-backed limits. `characteristic:` names a
  # ProductCharacteristic; resolver pulls the SpecBand at the active
  # vector params, applies tolerance_pct (guardband layered from the
  # profile), and stamps spec_ref on every row.
  quiescent_current:
    characteristic: quiescent_current
    tolerance_abs: 0.5           # ± 0.5 mA around 2.5 mA nominal
  rail_3v3:
    characteristic: rail_3v3
    tolerance_pct: 2.0           # ± 2% around 3.300 V nominal
