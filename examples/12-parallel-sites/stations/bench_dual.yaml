id: bench_dual
name: Dual-Site Bench
station_type: bench
description: >-
  Bench shared by two UUT sites — one PSU and one DMM, each with two
  channels (one per site). Mirrors examples/06-station-catalog's
  bench_01.yaml mock entries so --mock-instruments makes them
  instant/config-driven.
instruments:
  psu:
    type: psu
    driver: drivers.PSU
    resource: TCPIP::192.168.1.101::INSTR
    mock_config:
      set_voltage: 5.0
      set_current: 0.5
      measure_voltage: 5.0
      measure_current: 0.042
  dmm:
    type: dmm
    driver: drivers.DMM
    resource: TCPIP::192.168.1.102::INSTR
    mock_config:
      measure_dc_voltage: 3.3
      measure_dc_current: 0.042
