[pytest]
# --mock-instruments default-on so the demo runs without hardware.
#
# --uut-serials is dense (see docs/how-to/execution/multi-uut-testing.md):
# every site the fixture declares needs a serial. dual_site_bench.yaml
# declares two named sites (left, right), so the named form assigns
# site 0 (left) = SN-A, site 1 (right) = SN-B. Because
# fixtures/dual_site_bench.yaml has 2 sites, a bare `pytest` invocation
# fans out into the multi-site orchestrator automatically — no
# --fixture flag needed, see README.
addopts = --mock-instruments --uut-serials left=SN-A,right=SN-B
