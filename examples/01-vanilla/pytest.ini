[pytest]
# Vanilla stage: tests are pure pytest, but the TesterKit plugin stays
# enabled so you get the session-level value prop on day one — UUT
# serial prompt + run record — without writing any TesterKit-specific
# code. Pass --uut-serial=<value> to skip the prompt; later stages
# layer measurement-level features (verify, limits, markers) on top.
#
# --mock-instruments is set so the demo runs without a bench: the
# `psu` / `dmm` fixtures wrap the real driver classes in TesterKit's
# Mock factory. Drop the flag (or pass --no-mock-instruments) once
# you have hardware to point at.
addopts = --mock-instruments
