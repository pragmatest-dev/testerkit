[pytest]
# --mock-instruments default-on so the demo runs without hardware.
# This stage introduces station YAML + catalog + fixture connections,
# so instrument resolution goes through the station's `mock: true`
# entries — same effect as the flag. Drop both once a bench is
# attached. LITMUS_AUTO_CONFIRM=1 also handles the operator-prompt
# demo without a tty; see this example's README.
addopts = --mock-instruments
