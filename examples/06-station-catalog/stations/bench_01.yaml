id: bench_01
name: Bench 01
station_type: bench
description: Minimal bench — PSU sources the rail input, DMM measures the rail.
instruments:
  psu:
    type: psu
    driver: drivers.PSU
    resource: TCPIP::192.168.1.101::INSTR
    catalog_ref: generic_psu
    mock_config:
      set_voltage: 5.0
      set_current: 0.5
      measure_voltage: 5.0
      measure_current: 0.042
  dmm:
    type: dmm
    driver: drivers.DMM
    resource: TCPIP::192.168.1.102::INSTR
    catalog_ref: generic_dmm
    mock_config:
      measure_dc_voltage: 3.31
      measure_dc_current: 0.042
