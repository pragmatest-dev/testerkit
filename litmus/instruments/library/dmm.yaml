# Digital Multimeter Instrument Definition

instrument:
  type: dmm
  name: Digital Multimeter
  description: Voltage, current, and resistance measurements
  icon: speed
  driver_class: litmus.instruments.dmm.DMM

capabilities:
  - name: voltage_dc
    direction: input
    domain: voltage
    signal_types: [dc]
    description: Measure DC voltage

  - name: voltage_ac
    direction: input
    domain: voltage
    signal_types: [ac]
    description: Measure AC voltage

  - name: current_dc
    direction: input
    domain: current
    signal_types: [dc]
    description: Measure DC current

  - name: current_ac
    direction: input
    domain: current
    signal_types: [ac]
    description: Measure AC current

  - name: resistance
    direction: input
    domain: resistance
    description: Measure resistance (2-wire or 4-wire)

scpi_commands:
  identify: "*IDN?"
  reset: "*RST"
  measure_voltage_dc: "MEAS:VOLT:DC?"
  measure_voltage_ac: "MEAS:VOLT:AC?"
  measure_current_dc: "MEAS:CURR:DC?"
  measure_current_ac: "MEAS:CURR:AC?"
  measure_resistance: "MEAS:RES?"
  measure_resistance_4w: "MEAS:FRES?"
  measure_frequency: "MEAS:FREQ?"
  measure_period: "MEAS:PER?"

# Simulation defaults for pyvisa-sim
# These values are used when simulate=True and no sim_config is provided
simulation:
  idn: "Litmus,SimDMM,SN001,1.0"
  defaults:
    voltage: 0.0
    current: 0.0
    resistance: 1000.0
    frequency: 1000.0
