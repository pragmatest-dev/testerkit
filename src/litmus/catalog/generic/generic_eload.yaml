id: generic_eload
manufacturer: Generic
model: Electronic Load
name: Generic DC Electronic Load
description: Programmable DC electronic load for sinking current from DUT outputs
type: eload
scaffold: true
channels:
  '1':
    terminals:
    - hi
    - lo
    connector: binding_post
    ground: shared
capabilities:
- function: dc_current
  direction: input
  signals:
    current:
      range:
        min: 0
        max: 30
        units: A
- function: dc_voltage
  direction: input
  signals:
    voltage:
      range:
        min: 0
        max: 150
        units: V
