id: generic_smu
manufacturer: Generic
model: SMU
name: Generic Source Measure Unit
description: Single-channel SMU for precision voltage/current sourcing and measurement
type: smu
scaffold: true
channels:
  '1':
    terminals:
    - hi
    - lo
    - sense_hi
    - sense_lo
    connector: triax
    ground: floating
capabilities:
- function: dc_voltage
  direction: output
  signals:
    voltage:
      range:
        min: -20
        max: 20
        unit: V
    current:
      range:
        min: 0
        max: 0.1
        unit: A
- function: dc_current
  direction: output
  signals:
    current:
      range:
        min: -0.1
        max: 0.1
        unit: A
    voltage:
      range:
        min: 0
        max: 20
        unit: V
- function: dc_voltage
  direction: input
  signals:
    voltage:
      range:
        min: -20
        max: 20
        unit: V
      accuracy:
        pct_reading: 0.015
        pct_range: 0.005
- function: dc_current
  direction: input
  signals:
    current:
      range:
        min: -0.1
        max: 0.1
        unit: A
      accuracy:
        pct_reading: 0.05
        pct_range: 0.01
- function: resistance
  direction: input
  signals:
    resistance:
      range:
        min: 0.01
        max: 100000000
        unit: ohm
