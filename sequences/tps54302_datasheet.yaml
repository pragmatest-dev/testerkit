sequence:
  id: tps54302_datasheet
  name: TPS54302 - Datasheet Verification
  description: Complete test sequence from TPS54302 datasheet Section 7 - Typical
    Application Tests
  product_family: tps54302
  test_phase: production
  required_fixture: tps54302_fixture
  required_station_type: power_test_station
  steps:
  - id: vout_accuracy
    test: demo/tests/test_tps54302.py::TestOutputVoltage::test_output_voltage_accuracy
    description: Section 7.1 - Output Voltage Accuracy at 0.5A load
    limit_ref: specs.tps54302.output_voltage
  - id: vout_full_load
    test: demo/tests/test_tps54302.py::TestOutputVoltage::test_output_voltage_full_load
    description: Section 7.1 - Output Voltage at 3A full load
  - id: efficiency
    test: demo/tests/test_tps54302.py::TestEfficiency::test_efficiency_1a_load
    description: Section 7.3 - Efficiency Test at 1A load (>= 90%)
  - id: output_ripple
    test: demo/tests/test_tps54302.py::TestRipple::test_output_ripple_full_load
    description: Section 7.4 - Output Ripple at 3A (<= 50mVpp)
  - id: quiescent_current
    test: demo/tests/test_tps54302.py::TestQuiescentCurrent::test_quiescent_current
    description: "Section 4.1 - Quiescent current (<= 200\xB5A)"
