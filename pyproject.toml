[project]
name = "litmus"
version = "0.1.0"
description = "Hardware test platform for the AI-assisted era"
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "pyvisa>=1.14",
    "pyvisa-sim>=0.6",
    "pyarrow>=14.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "python-multipart>=0.0.9",
    "click>=8.1",
    "nicegui>=2.0",
    "httpx>=0.28.1",
    "fastmcp>=2.0",
    "jinja2>=3.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "ruff>=0.4.0",
]
# Optional instrument library integrations
# Note: These are optional and not installed by default
# instrumentkit = ["instrumentkit>=1.0"]  # AGPL license, install manually if needed
pymeasure = [
    "pymeasure>=0.14",
]
ni = [
    "nidaqmx>=0.9",
]
lxi = [
    "zeroconf>=0.80",
]
pdf = [
    "weasyprint>=62.0",
]

[project.scripts]
litmus = "litmus.cli:main"

[project.entry-points.pytest11]
litmus = "litmus.execution.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    # @litmus_test returns TestStep for programmatic use, pytest can ignore it
    "ignore::pytest.PytestReturnNotNoneWarning",
]

[dependency-groups]
dev = [
    "duckdb>=1.4.4",
    "playwright>=1.58.0",
    "pymupdf>=1.26.7",
    "pytest-asyncio>=1.3.0",
]
