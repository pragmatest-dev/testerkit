[project]
name = "litmus"
version = "0.1.0"
description = "Hardware test platform for the AI-assisted era"
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "pyvisa>=1.14",
    "pyvisa-sim>=0.6",
    "pyarrow>=14.0",
    "numpy>=1.24",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "python-multipart>=0.0.9",
    "click>=8.1",
    "nicegui>=2.0",
    "httpx>=0.28.1",
    "fastmcp>=2.0",
    "jinja2>=3.1",
    "ruamel-yaml>=0.19.1",
    "filelock>=3.12",
    "platformdirs>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "ruff>=0.4.0",
]
# Optional instrument library integrations
# Note: These are optional and not installed by default
# instrumentkit = ["instrumentkit>=1.0"]  # AGPL license, install manually if needed
pymeasure = [
    "pymeasure>=0.14",
]
ni = [
    "nidaqmx>=0.9",
]
lxi = [
    "zeroconf>=0.80",
]
pdf = [
    "weasyprint>=62.0",
]
sbom = [
    "cyclonedx-python-lib>=11.0",
]
# Format exporters
stdf = ["Semi-ATE-STDF>=0.1"]
hdf5 = ["h5py>=3.0"]
tdms = ["npTDMS>=1.0"]
mdf4 = ["asammdf>=8.0"]
# Transports
s3 = ["boto3>=1.26"]
gcs = ["google-cloud-storage>=2.0"]
azure = ["azure-storage-blob>=12.0"]
sftp = ["paramiko>=3.0"]
# Bundles
all-exporters = ["litmus[stdf,hdf5,tdms,mdf4]"]

[project.scripts]
litmus = "litmus.cli:main"

[project.entry-points.pytest11]
litmus = "litmus.execution.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    # @litmus_test returns TestStep for programmatic use, pytest can ignore it
    "ignore::pytest.PytestReturnNotNoneWarning",
]

[dependency-groups]
dev = [
    "duckdb>=1.4.4",
    "nisyscfg>=0.2",
    "playwright>=1.58.0",
    "pymupdf>=1.26.7",
    "pyserial>=3.5",
    "pytest-asyncio>=1.3.0",
    "weasyprint>=62.0",
    "cyclonedx-python-lib>=11.0",
    "zeroconf>=0.80",
]
