<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Litmus Ontology — Graph</title>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --bg: #f8f9fa;
      --panel: #ffffff;
      --border: #d0d7de;
      --muted: #57606a;
      --text: #1f2328;
    }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text); background: var(--bg);
    }
    #app {
      display: grid; grid-template-columns: 280px 1fr 320px; height: 100vh;
    }
    aside {
      background: var(--panel); border-right: 1px solid var(--border);
      padding: 14px 16px; overflow-y: auto; font-size: 13px;
    }
    aside.right { border-right: none; border-left: 1px solid var(--border); }
    aside h2 {
      font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted); margin: 18px 0 6px;
    }
    aside h2:first-child { margin-top: 0; }
    aside label {
      display: flex; align-items: center; gap: 6px;
      padding: 2px 0; cursor: pointer; user-select: none;
    }
    aside label .swatch {
      display: inline-block; width: 12px; height: 12px;
      border-radius: 2px; border: 1px solid rgba(0,0,0,0.15);
    }
    aside .preset {
      display: inline-block; margin: 2px 4px 2px 0; padding: 3px 8px;
      background: #eef1f4; border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    aside .preset:hover { background: #e2e6ea; }
    aside input[type="search"] {
      width: 100%; padding: 5px 8px;
      border: 1px solid var(--border); border-radius: 4px;
      box-sizing: border-box; font-size: 13px;
    }
    main { position: relative; }
    #graph { position: absolute; inset: 0; }
    .panel-body { font-size: 13px; }
    .panel-body .meta { color: var(--muted); }
    .panel-body code {
      background: #eef1f4; padding: 1px 4px;
      border-radius: 3px; font-size: 12px;
    }
    .panel-body ul { padding-left: 16px; margin: 6px 0; }
    .panel-body .empty { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
<div id="app">
  <aside class="left">
    <h2>Search</h2>
    <input type="search" id="search" placeholder="id, model, or summary…" autocomplete="off">

    <h2>Concept categories</h2>
    <div id="cat-filters"></div>

    <h2>Verbs</h2>
    <div id="verb-filters"></div>

    <h2>Presets</h2>
    <div>
      <span class="preset" data-preset="semantic">Semantic only</span>
      <span class="preset" data-preset="structural">Structural only</span>
      <span class="preset" data-preset="events">Events only</span>
      <span class="preset" data-preset="all">Show all</span>
    </div>
  </aside>

  <main>
    <div id="graph"></div>
    <div id="counter"
         style="position: absolute; bottom: 10px; left: 12px; background: rgba(255,255,255,0.85);
                border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px;
                font-size: 12px; color: var(--muted); pointer-events: none;"></div>
  </main>

  <aside class="right">
    <h2>Selected concept</h2>
    <div id="panel" class="panel-body">
      <div class="empty">Click a node to inspect.</div>
    </div>
  </aside>
</div>

<script>
const ONTOLOGY = {"version": 1, "nodes": [{"id": "project_config", "label": "ProjectConfig", "category": "definition", "model": "litmus.models.project.ProjectConfig", "authored_at": "litmus.yaml", "event_type": null, "summary": "Project root config. Names the default station/fixture/profile, data dir, multi-slot knobs, profiles, and required operator inputs.", "docs": "docs/reference/configuration.md"}, {"id": "profile_config", "label": "ProfileConfig", "category": "definition", "model": "litmus.models.project.ProfileConfig", "authored_at": "litmus.yaml (under profiles:)", "event_type": null, "summary": "Named config set applied to a pytest session. Same flat shape as a TestEntry plus profile-only description/facets/extends and an optional station_type / fixture binding. Selected via CLI facets.", "docs": "docs/concepts/sessions.md"}, {"id": "multi_slot_config", "label": "MultiSlotConfig", "category": "primitive", "model": "litmus.models.project.MultiSlotConfig", "authored_at": null, "event_type": null, "summary": "Multi-slot orchestration knobs (per-child grace seconds, etc.).", "docs": null}, {"id": "product", "label": "Product", "category": "definition", "model": "litmus.models.product.Product", "authored_at": "products/*.yaml | products/{id}/spec.yaml", "event_type": null, "summary": "Spec for a thing-under-test: identity, pins, signal groups, and characteristics. ATML \"UUT Description\".", "docs": "docs/concepts/products.md"}, {"id": "product_manifest", "label": "ProductManifest", "category": "definition", "model": "litmus.models.product_manifest.ProductManifest", "authored_at": "products/{id}/manifest.yaml", "event_type": null, "summary": "Per-product folder manifest tracking workflow position (parse → review → derive → select station → generate tests → execute).", "docs": null}, {"id": "pin", "label": "Pin", "category": "primitive", "model": "litmus.models.product.Pin", "authored_at": null, "event_type": null, "summary": "Physical DUT pin with role classification (signal / ground / power / reference) for fixture routing.", "docs": null}, {"id": "signal_group", "label": "SignalGroup", "category": "primitive", "model": "litmus.models.product.SignalGroup", "authored_at": null, "event_type": null, "summary": "Grouped signals forming a bus interface (I2C, SPI, UART).", "docs": null}, {"id": "bus_signal", "label": "BusSignal", "category": "primitive", "model": "litmus.models.product.BusSignal", "authored_at": null, "event_type": null, "summary": "One signal within a bus group; references a Pin by name.", "docs": null}, {"id": "product_characteristic", "label": "ProductCharacteristic", "category": "definition", "model": "litmus.models.product.ProductCharacteristic", "authored_at": "products/*.yaml (under characteristics:)", "event_type": null, "summary": "A DUT capability tied to a physical interface (pin/pins/net/ signal_group) with optional datasheet ref. Extends Capability — the matching service pairs DUT OUTPUT characteristics with instrument INPUT capabilities by direction flip.", "docs": "docs/concepts/capability-model.md"}, {"id": "station_config", "label": "StationConfig", "category": "definition", "model": "litmus.models.station.StationConfig", "authored_at": "stations/*.yaml", "event_type": null, "summary": "Concrete bench deployment. Names a station_type for contract validation; hostname enables session-start auto-match against socket.gethostname().", "docs": "docs/concepts/stations.md"}, {"id": "station_instrument_config", "label": "StationInstrumentConfig", "category": "primitive", "model": "litmus.models.station.StationInstrumentConfig", "authored_at": null, "event_type": null, "summary": "Single instrument entry in a station file — type, driver, resource, optional catalog_ref, mock flag, channel mapping.", "docs": null}, {"id": "station_type", "label": "StationType", "category": "definition", "model": "litmus.models.station.StationType", "authored_at": "stations/types/*.yaml", "event_type": null, "summary": "Abstract station-type template. Declares required instrument roles + types that concrete StationConfig deployments must cover.", "docs": null}, {"id": "instrument_config", "label": "InstrumentConfig", "category": "primitive", "model": "litmus.models.station.InstrumentConfig", "authored_at": null, "event_type": null, "summary": "Instrument-role declaration inside a StationType (type + driver + settings, no resource). The contract a deployment must satisfy.", "docs": null}, {"id": "instrument_catalog_entry", "label": "InstrumentCatalogEntry", "category": "definition", "model": "litmus.models.catalog.InstrumentCatalogEntry", "authored_at": "catalog/**/*.yaml", "event_type": null, "summary": "Universal tier of the 3-tier instrument model — what a make/model can do. Channels, attributes, and a list of InstrumentCapability entries. Tier 1 of (catalog → asset → record).", "docs": "docs/reference/capability-schema.md"}, {"id": "instrument_asset_file", "label": "InstrumentAssetFile", "category": "definition", "model": "litmus.models.instrument_asset.InstrumentAssetFile", "authored_at": "instruments/*.yaml", "event_type": null, "summary": "Unit-specific tier of the 3-tier instrument model — a specific physical device (serial, calibration) referencing a catalog entry. Tier 2 of (catalog → asset → record).", "docs": null}, {"id": "fixture_config", "label": "FixtureConfig", "category": "definition", "model": "litmus.models.test_config.FixtureConfig", "authored_at": "fixtures/*.yaml", "event_type": null, "summary": "Bench-to-DUT wiring. Either single-DUT connections or multi-slot slots; never both. station_types[] declares which abstract station layouts this fixture can wire against.", "docs": "docs/concepts/fixtures.md"}, {"id": "fixture_connection", "label": "FixtureConnection", "category": "primitive", "model": "litmus.models.test_config.FixtureConnection", "authored_at": null, "event_type": null, "summary": "Named DUT-pin ↔ instrument-channel pairing — the addressable unit of fixture routing. Optionally carries a measurement function (DMM for DC, scope for AC) and a SwitchRoute for switched fixtures.", "docs": null}, {"id": "fixture_slot", "label": "FixtureSlot", "category": "primitive", "model": "litmus.models.test_config.FixtureSlot", "authored_at": null, "event_type": null, "summary": "One DUT slot inside a multi-DUT fixture; has its own connection map.", "docs": null}, {"id": "switch_route", "label": "SwitchRoute", "category": "primitive", "model": "litmus.models.test_config.SwitchRoute", "authored_at": null, "event_type": null, "summary": "Switch channels to close before this connection's instrument can be used; carries settling time.", "docs": null}, {"id": "capability", "label": "Capability", "category": "primitive", "model": "litmus.models.capability.Capability", "authored_at": null, "event_type": null, "summary": "What a signal endpoint can do — base of both ProductCharacteristic (DUT side) and InstrumentCapability (bench side). Function + direction + signals/conditions/controls/attributes. ATML/IVI/ IEEE 1641 lineage.", "docs": "docs/concepts/capabilities.md"}, {"id": "instrument_capability", "label": "InstrumentCapability", "category": "primitive", "model": "litmus.models.capability.InstrumentCapability", "authored_at": null, "event_type": null, "summary": "Capability + channel list + operational metadata. The instrument- side dialect of the shared Capability shape.", "docs": null}, {"id": "spec_band", "label": "SpecBand", "category": "primitive", "model": "litmus.models.capability.SpecBand", "authored_at": null, "event_type": null, "summary": "Condition-dependent spec override — \"at this operating point, here are the specs.\" Empty `when:` always matches. Anchors the shared \"top-level default + optional when:-keyed override\" pattern.", "docs": null}, {"id": "signal", "label": "Signal", "category": "primitive", "model": "litmus.models.capability.Signal", "authored_at": null, "event_type": null, "summary": "A measurable/sourceable parameter (range + accuracy + resolution).", "docs": null}, {"id": "condition", "label": "Condition", "category": "primitive", "model": "litmus.models.capability.Condition", "authored_at": null, "event_type": null, "summary": "Operating condition that affects accuracy (frequency, temperature, NPLC, …). NOT user-adjustable — describes the envelope under which specs were characterized.", "docs": null}, {"id": "control", "label": "Control", "category": "primitive", "model": "litmus.models.capability.Control", "authored_at": null, "event_type": null, "summary": "A user-configurable knob (coupling, autorange, setpoint, …).", "docs": null}, {"id": "attribute", "label": "Attribute", "category": "primitive", "model": "litmus.models.capability.Attribute", "authored_at": null, "event_type": null, "summary": "Fixed hardware fact (bandwidth, sample rate, scpi_version) — value or range or options, optionally banded.", "docs": null}, {"id": "channel_topology", "label": "ChannelTopology", "category": "primitive", "model": "litmus.models.capability.ChannelTopology", "authored_at": null, "event_type": null, "summary": "Physical topology of a single instrument channel — terminals, connector type, ground topology, optional flag.", "docs": null}, {"id": "instrument_info", "label": "InstrumentInfo", "category": "primitive", "model": "litmus.models.instrument.InstrumentInfo", "authored_at": null, "event_type": null, "summary": "Identity queried from device (manufacturer/model/serial/firmware). For VISA, parsed from *IDN?.", "docs": null}, {"id": "calibration_info", "label": "CalibrationInfo", "category": "primitive", "model": "litmus.models.instrument.CalibrationInfo", "authored_at": null, "event_type": null, "summary": "Calibration status from configuration (due/last/cert/lab). NOT queryable from device — comes from the asset file.", "docs": null}, {"id": "test_entry", "label": "TestEntry", "category": "config-overlay", "model": "litmus.models.test_config.TestEntry", "authored_at": null, "event_type": null, "summary": "Recursive node in a sidecar/profile tests: tree. Mirrors pytest's node-id structure: class = branch with own marker fields + nested tests:; function = leaf. Reserved keys at every level: runner, tests. Every other key is a typed Litmus-marker sub-model.", "docs": "docs/concepts/step-manifest.md"}, {"id": "sidecar_config", "label": "SidecarConfig", "category": "config-overlay", "model": "litmus.models.test_config.SidecarConfig", "authored_at": "tests/test_*.yaml", "event_type": null, "summary": "Top-level shape of a per-test-module sidecar YAML. Same flat TestEntry shape; the file root carries file-level marker fields and a nested tests: tree.", "docs": "docs/concepts/step-manifest.md"}, {"id": "litmus_marker", "label": "LitmusMarker", "category": "config-overlay", "model": null, "authored_at": null, "event_type": null, "summary": "A @pytest.mark.litmus_* decorator on a test. Anything authorable in a sidecar's marker fields can also be written as a marker. Same vocabulary; the marker form is closer to the code.", "docs": null}, {"id": "sweep_entry", "label": "SweepEntry", "category": "primitive", "model": "litmus.models.test_config.SweepEntry", "authored_at": null, "event_type": null, "summary": "One sweep level — {argname: argvalues, …}. Multiple keys = a zipped axis; all lengths must match (validated at YAML load).", "docs": null}, {"id": "mock_entry", "label": "MockEntry", "category": "primitive", "model": "litmus.models.test_config.MockEntry", "authored_at": null, "event_type": null, "summary": "Per-test mock — target (\"<fixture>.<attr>\") plus arbitrary patch.object kwargs (return_value, side_effect, …).", "docs": null}, {"id": "retry_config", "label": "RetryConfig", "category": "primitive", "model": "litmus.models.test_config.RetryConfig", "authored_at": null, "event_type": null, "summary": "Runner-neutral retry config — translates to flaky under pytest. max_retries=0 means single execution (no retry).", "docs": null}, {"id": "prompt_config", "label": "PromptConfig", "category": "primitive", "model": "litmus.models.test_config.PromptConfig", "authored_at": null, "event_type": null, "summary": "Operator prompt — message + type (confirm/choice/input) + optional timeout. Used for required_inputs and per-step dialogs.", "docs": null}, {"id": "measurement_limit_config", "label": "MeasurementLimitConfig", "category": "primitive", "model": "litmus.models.test_config.MeasurementLimitConfig", "authored_at": null, "event_type": null, "summary": "Per-measurement limit policy — direct, characteristic-derived, banded, expression, lookup, step, or callable. The first matching band (or the parent fallback) wins at vector resolve time.", "docs": null}, {"id": "limit_lookup_config", "label": "LimitLookupConfig", "category": "primitive", "model": "litmus.models.test_config.LimitLookupConfig", "authored_at": null, "event_type": null, "summary": "Lookup-table limit — value of `key` indexes a table of Limits.", "docs": null}, {"id": "limit_step_config", "label": "LimitStepConfig", "category": "primitive", "model": "litmus.models.test_config.LimitStepConfig", "authored_at": null, "event_type": null, "summary": "Step-function limit — ranges with `below:` thresholds and a `default:` catch-all.", "docs": null}, {"id": "limit", "label": "Limit", "category": "primitive", "model": "litmus.models.test_config.Limit", "authored_at": null, "event_type": null, "summary": "A resolved test limit — low/high/nominal + units + comparator (GELE, EQ, LE, …) + optional traceability (characteristic_id, spec_ref). Per-comparator membership check via Limit.__contains__.", "docs": null}, {"id": "session", "label": "Session", "category": "lifecycle", "model": null, "authored_at": null, "event_type": null, "summary": "A pytest session or interactive Connect context, identified by a session_id (UUID). Every event carries session_id; cross-store joins use it as the parent key. No single Pydantic model — the lifecycle is bracketed by SessionStarted/SessionEnded events.", "docs": "docs/concepts/sessions.md"}, {"id": "test_run", "label": "TestRun", "category": "runtime", "model": "litmus.data.models.TestRun", "authored_at": null, "event_type": null, "summary": "One complete test execution against one DUT on one Station. Carries DUT/product/station/fixture traceability, profile/facets, git context, operator, collected items, executed steps, custom metadata, and the final outcome.", "docs": "docs/concepts/three-stores.md"}, {"id": "test_step", "label": "TestStep", "category": "runtime", "model": "litmus.data.models.TestStep", "authored_at": null, "event_type": null, "summary": "One pytest test function invocation. Contains TestVectors expanded from sweep/parametrize. Carries code identity (node_id, file, module, class, function, markers) and a stamped outcome.", "docs": null}, {"id": "test_vector", "label": "TestVector", "category": "runtime", "model": "litmus.data.models.TestVector", "authored_at": null, "event_type": null, "summary": "One parameter-set execution of a step. Carries params (in_*), observations (out_*), stimulus signal paths, measurements, retry counter, and a per-vector outcome.", "docs": null}, {"id": "measurement", "label": "Measurement", "category": "runtime", "model": "litmus.data.models.Measurement", "authored_at": null, "event_type": null, "summary": "Single measurement — name, value, units, limit fields, outcome. Carries full signal path (dut_pin, instrument_name, resource, channel, fixture_connection) for traceability. check_limit() is the single comparator-aware judgment path.", "docs": null}, {"id": "stimulus_record", "label": "StimulusRecord", "category": "runtime", "model": "litmus.data.models.StimulusRecord", "authored_at": null, "event_type": null, "summary": "Captured stimulus (commanded inputs) — param/value/units + instrument/resource/channel + dut_pin + fixture_connection.", "docs": null}, {"id": "dut", "label": "DUT", "category": "runtime", "model": "litmus.data.models.DUT", "authored_at": null, "event_type": null, "summary": "Physical instance of a Product — serial, part_number, revision, lot_number. Created at run start from operator scan or CLI.", "docs": "docs/concepts/architecture-erd.md"}, {"id": "collected_item", "label": "CollectedItem", "category": "runtime", "model": "litmus.data.models.CollectedItem", "authored_at": null, "event_type": null, "summary": "Pytest-collected item with collection-time-assigned indices (step_index, vector_index, vector_count_planned). Enables manifest reconciliation against executed steps to detect unrun vectors.", "docs": null}, {"id": "run_summary", "label": "RunSummary", "category": "runtime", "model": "litmus.data.models.RunSummary", "authored_at": null, "event_type": null, "summary": "Lightweight run header read from the parquet index (no steps or measurements). Powers the runs list view.", "docs": null}, {"id": "waveform", "label": "Waveform", "category": "runtime", "model": "litmus.data.models.Waveform", "authored_at": null, "event_type": null, "summary": "Time-series data shape — t0 + dt + Y[]. Time axis is reconstructed from t0 + i*dt; no paired timestamps stored. The shape carried by array-type channels and array-valued instrument reads. Not a field on any other Pydantic model — flows through as data, not a typed reference.", "docs": null}, {"id": "instrument_record", "label": "InstrumentRecord", "category": "runtime", "model": "litmus.models.instrument.InstrumentRecord", "authored_at": null, "event_type": null, "summary": "Tier 3 of the 3-tier instrument model — runtime view combining role + asset + identity + calibration + driver + catalog_ref + mock flag. What the fixture/logger tracks during a session.", "docs": null}, {"id": "channel_descriptor", "label": "ChannelDescriptor", "category": "runtime", "model": "litmus.data.channels.models.ChannelDescriptor", "authored_at": null, "event_type": null, "summary": "Metadata for a live channel — data_type (scalar/array), instru const CATEGORY_STYLES = {
  "definition":     { color: "#dde9f5", border: "#345e8f", shape: "box" },
  "primitive":      { color: "#ebeef2", border: "#6b7682", shape: "dot" },
  "config-overlay": { color: "#f1dcec", border: "#824073", shape: "box" },
  "runtime":        { color: "#dcecdc", border: "#3f7e3f", shape: "box" },
  "event":          { color: "#f5dcc1", border: "#8a5a26", shape: "ellipse" },
  "store":          { color: "#f5e7b8", border: "#8a7026", shape: "diamond" },
  "enum":           { color: "#e8e8c4", border: "#75752a", shape: "dot" },
  "lifecycle":      { color: "#fff2c4", border: "#7a6620", shape: "hexagon" },
  "external":       { color: "#dddddd", border: "#666666", shape: "box" },
};

const VERB_STYLES = {
  "composition": { color: "#9e9e9e", dashes: false,  width: 1 },
  "temporal":    { color: "#5d8aa8", dashes: false,  width: 1.5 },
  "naming":      { color: "#9e9e9e", dashes: [4, 4], width: 1 },
  "type":        { color: "#7b1fa2", dashes: false,  width: 2 },
  "semantic":    { color: "#1976d2", dashes: false,  width: 2 },
  "event":       { color: "#e64a19", dashes: false,  width: 1.5 },
  "overlay":     { color: "#388e3c", dashes: false,  width: 2 },
  "storage":     { color: "#fbc02d", dashes: false,  width: 1.5 },
};

const visNodes = new vis.DataSet(ONTOLOGY.nodes.map(n => {
  const style = CATEGORY_STYLES[n.category] || CATEGORY_STYLES.primitive;
  return {
    id: n.id,
    label: n.label,
    title: `${n.label}\n${n.category}\n${n.summary}`,
    shape: style.shape,
    color: {
      background: style.color,
      border: style.border,
      highlight: { background: "#fff8b3", border: style.border },
    },
    borderWidth: 1.5,
    font: { size: 13 },
  };
}));

const visEdges = new vis.DataSet(ONTOLOGY.edges.map((e, i) => {
  const cat = ONTOLOGY.verb_categories[e.kind] || "composition";
  const style = VERB_STYLES[cat];
  return {
    id: i,
    from: e.source,
    to: e.target,
    label: e.kind,
    arrows: { to: { enabled: true, scaleFactor: 0.6 } },
    color: { color: style.color, highlight: "#1f1f1f", hover: "#1f1f1f" },
    dashes: style.dashes,
    width: style.width,
    font: {
      size: 10, color: "#444",
      background: "rgba(255,255,255,0.7)",
      strokeWidth: 0, align: "middle",
    },
    smooth: { enabled: true, type: "curvedCW", roundness: 0.12 + (i % 5) * 0.04 },
    _kind: e.kind,
    _verbCat: cat,
  };
}));

const network = new vis.Network(
  document.getElementById("graph"),
  { nodes: visNodes, edges: visEdges },
  {
    physics: {
      stabilization: { iterations: 200 },
      barnesHut: { gravitationalConstant: -8000, springLength: 130 },
    },
    interaction: {
      hover: true, tooltipDelay: 150,
      navigationButtons: true, keyboard: true,
    },
    edges: { selectionWidth: 2 },
  },
);

// -------- Filters --------
const ALL_CATS = Array.from(new Set(ONTOLOGY.nodes.map(n => n.category))).sort();
const ALL_VERBS = Array.from(new Set(ONTOLOGY.edges.map(e => e.kind))).sort();

const catEnabled = Object.fromEntries(ALL_CATS.map(c => [c, true]));
const verbEnabled = Object.fromEntries(ALL_VERBS.map(v => [v, true]));

// Precompute per-node edge degree so we can distinguish "structurally
// disconnected node" (no edges at all in the ontology — should respect
// only the category filter) from "filtered-orphan" (had edges, all hidden
// by current filters — should also hide so the canvas stays clean).
const NODE_BY_ID = new Map(ONTOLOGY.nodes.map(n => [n.id, n]));
const TOTAL_DEGREE = new Map();
ONTOLOGY.edges.forEach(e => {
  TOTAL_DEGREE.set(e.source, (TOTAL_DEGREE.get(e.source) || 0) + 1);
  TOTAL_DEGREE.set(e.target, (TOTAL_DEGREE.get(e.target) || 0) + 1);
});

function applyFilters() {
  // 1) Decide which edges pass — both endpoints' categories enabled AND verb enabled.
  const visibleEdges = new Set();
  ONTOLOGY.edges.forEach((e, i) => {
    const fromCat = NODE_BY_ID.get(e.source)?.category;
    const toCat   = NODE_BY_ID.get(e.target)?.category;
    if (!verbEnabled[e.kind]) return;
    if (!catEnabled[fromCat] || !catEnabled[toCat]) return;
    visibleEdges.add(i);
  });

  // 2) Tally which nodes still have at least one visible incident edge.
  const nodesWithEdge = new Set();
  ONTOLOGY.edges.forEach((e, i) => {
    if (visibleEdges.has(i)) {
      nodesWithEdge.add(e.source);
      nodesWithEdge.add(e.target);
    }
  });

  // 3) A node is visible iff:
  //      its category is enabled, AND
  //      (it has no edges in the ontology OR at least one edge survives filtering).
  let nodeShown = 0;
  ONTOLOGY.nodes.forEach(n => {
    const catOn = catEnabled[n.category];
    const isStructuralIsolate = (TOTAL_DEGREE.get(n.id) || 0) === 0;
    const show = catOn && (isStructuralIsolate || nodesWithEdge.has(n.id));
    visNodes.update({ id: n.id, hidden: !show });
    if (show) nodeShown++;
  });

  let edgeShown = 0;
  visEdges.forEach(e => {
    const show = visibleEdges.has(e.id);
    visEdges.update({ id: e.id, hidden: !show });
    if (show) edgeShown++;
  });

  document.getElementById("counter").textContent =
    `${nodeShown}/${ONTOLOGY.nodes.length} concepts  ·  ${edgeShown}/${ONTOLOGY.edges.length} relationships`;
}

function makeCheckbox(parent, label, swatchColor, initial, onChange) {
  const wrap = document.createElement("label");
  const cb = document.createElement("input");
  cb.type = "checkbox"; cb.checked = initial;
  cb.addEventListener("change", () => onChange(cb.checked));
  const sw = document.createElement("span");
  sw.className = "swatch";
  sw.style.background = swatchColor;
  const txt = document.createElement("span");
  txt.textContent = label;
  wrap.append(cb, sw, txt);
  parent.appendChild(wrap);
  return cb;
}

const catFiltersEl = document.getElementById("cat-filters");
const catCheckboxes = {};
ALL_CATS.forEach(c => {
  const color = CATEGORY_STYLES[c]?.color || "#ccc";
  catCheckboxes[c] = makeCheckbox(catFiltersEl, c, color, true, on => {
    catEnabled[c] = on; applyFilters();
  });
});

const verbFiltersEl = document.getElementById("verb-filters");
const verbCheckboxes = {};
ALL_VERBS.forEach(v => {
  const cat = ONTOLOGY.verb_categories[v] || "composition";
  verbCheckboxes[v] = makeCheckbox(verbFiltersEl, v, VERB_STYLES[cat].color, true, on => {
    verbEnabled[v] = on; applyFilters();
  });
});

document.querySelectorAll(".preset").forEach(el => {
  el.addEventListener("click", () => {
    const preset = el.dataset.preset;
    const enabledCats = preset === "events" ? ["event", "runtime", "lifecycle"] : ALL_CATS;
    ALL_CATS.forEach(c => {
      catEnabled[c] = enabledCats.includes(c);
      catCheckboxes[c].checked = catEnabled[c];
    });
    ALL_VERBS.forEach(v => {
      const cat = ONTOLOGY.verb_categories[v];
      let on = true;
      if (preset === "semantic")   on = ["semantic", "type", "overlay"].includes(cat);
      if (preset === "structural") on = ["composition", "temporal", "naming", "storage"].includes(cat);
      if (preset === "events")     on = cat === "event";
      verbEnabled[v] = on;
      verbCheckboxes[v].checked = on;
    });
    applyFilters();
  });
});

// -------- Search --------
document.getElementById("search").addEventListener("input", ev => {
  const q = ev.target.value.trim().toLowerCase();
  if (!q) return;
  const hit = ONTOLOGY.nodes.find(n =>
    n.id.toLowerCase().includes(q)
    || n.label.toLowerCase().includes(q)
    || (n.model || "").toLowerCase().includes(q)
    || n.summary.toLowerCase().includes(q));
  if (hit) {
    network.selectNodes([hit.id]);
    network.focus(hit.id, {
      scale: 1.2,
      animation: { duration: 400, easingFunction: "easeInOutQuad" },
    });
    renderPanel(hit.id);
  }
});

// -------- Detail panel --------
function renderPanel(id) {
  const n = ONTOLOGY.nodes.find(x => x.id === id);
  if (!n) return;
  const outgoing = ONTOLOGY.edges.filter(e => e.source === id);
  const incoming = ONTOLOGY.edges.filter(e => e.target === id);
  const fmt = (es, dir) => {
    if (!es.length) return `<div class="empty">none</div>`;
    return "<ul>" + es.map(e => {
      const other = dir === "out" ? e.target : e.source;
      return `<li><code>${e.kind}</code> → <a href="#" data-jump="${other}">${other}</a></li>`;
    }).join("") + "</ul>";
  };

  const panel = document.getElementById("panel");
  panel.innerHTML = `
    <div><strong>${n.label}</strong></div>
    <div class="meta">${n.category}${n.event_type ? ` · ${n.event_type}` : ""}</div>
    ${n.model ? `<div class="meta">Model: <code>${n.model}</code></div>` : ""}
    ${n.authored_at ? `<div class="meta">Authored at: <code>${n.authored_at}</code></div>` : ""}
    <p>${n.summary}</p>
    <h2 style="margin-top:14px">Out</h2>${fmt(outgoing, "out")}
    <h2>In</h2>${fmt(incoming, "in")}
    ${n.docs ? `<div class="meta" style="margin-top:8px">Doc: <code>${n.docs}</code></div>` : ""}
  `;
  panel.querySelectorAll("a[data-jump]").forEach(a => {
    a.addEventListener("click", ev => {
      ev.preventDefault();
      const target = a.dataset.jump;
      network.selectNodes([target]);
      network.focus(target, { scale: 1.2, animation: { duration: 400 } });
      renderPanel(target);
    });
  });
}

network.on("selectNode", ev => renderPanel(ev.nodes[0]));

// Initial pass so the counter reflects the as-loaded state.
applyFilters();
</script>
