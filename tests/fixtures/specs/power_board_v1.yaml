id: power_board_v1
name: DC-DC Power Board Rev A
description: 5V to 3.3V buck converter with 1A output capability
revision: B
characteristics:
  rail_5v_input:
    function: dc_voltage
    direction: input
    units: V
    net: VIN
    datasheet_ref: DS-001 Section 7.2, Table 3
    bands:
    - when:
        temperature: 25
        load: 0.5
      value: 5.0
      accuracy:
        pct_reading: 5.0
    - when:
        temperature: -40
        load: 0.5
      value: 5.0
      accuracy:
        pct_reading: 7.0
    - when:
        temperature: 85
        load: 0.5
      value: 5.0
      accuracy:
        pct_reading: 6.0
  rail_3v3_output:
    function: dc_voltage
    direction: output
    units: V
    net: VOUT_3V3
    datasheet_ref: DS-001 Section 7.3
    bands:
    - when:
        temperature: 25
        load: 0.1
        input_voltage: 5.0
      value: 3.3
      accuracy:
        pct_reading: 3.0
    - when:
        temperature: 25
        load: 1.0
        input_voltage: 5.0
      value: 3.3
      accuracy:
        pct_reading: 4.0
    - when:
        temperature: -40
        load: 0.5
        input_voltage: 4.5
      value: 3.3
      accuracy:
        pct_reading: 5.0
    - when:
        temperature: 85
        load: 1.0
        input_voltage: 5.5
      value: 3.3
      accuracy:
        pct_reading: 6.0
  quiescent_current:
    function: dc_current
    direction: input
    units: A
    net: IIN
    datasheet_ref: DS-001 Section 7.4
    bands:
    - when:
        temperature: 25
        load: 0
      value: 0.01
    - when:
        temperature: 85
        load: 0
      value: 0.015
  efficiency:
    function: dc_power
    direction: output
    units: '%'
    pins:
    - VIN
    - VOUT
    datasheet_ref: DS-001 Section 7.5
    bands:
    - when:
        temperature: 25
        load: 0.5
      value: 85
    - when:
        temperature: 25
        load: 1.0
      value: 80
