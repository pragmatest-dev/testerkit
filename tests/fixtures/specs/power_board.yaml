# Power Board Product Specification
# Example product definition following ATML-inspired modeling

product:
  id: power_board_v1
  name: "DC-DC Power Board Rev A"
  description: "5V to 3.3V buck converter with 1A output capability"
  revision: "A"
  datasheet: "docs/DS-001.pdf"
  schematic: "docs/SCH-001.pdf"

characteristics:
  # DUT INPUT: needs instrument OUTPUT (PSU) to source it
  rail_5v_input:
    function: dc_voltage
    direction: input
    units: V
    net: "VIN"
    datasheet_ref: "DS-001 Section 7.2, Table 3"
    specs:
      - when:
          temperature: 25
          load: 0.5
        value: 5.0
        accuracy: {pct_reading: 5.0}

      - when:
          temperature: -40
          load: 0.5
        value: 5.0
        accuracy: {pct_reading: 7.0}

      - when:
          temperature: 85
          load: 0.5
        value: 5.0
        accuracy: {pct_reading: 6.0}

  # DUT OUTPUT: needs instrument INPUT (DMM) to measure it
  rail_3v3_output:
    function: dc_voltage
    direction: output
    units: V
    net: "VOUT_3V3"
    datasheet_ref: "DS-001 Section 7.3"
    specs:
      - when:
          temperature: 25
          load: 0.1
          input_voltage: 5.0
        value: 3.3
        accuracy: {pct_reading: 3.0}

      - when:
          temperature: 25
          load: 1.0
          input_voltage: 5.0
        value: 3.3
        accuracy: {pct_reading: 4.0}

      - when:
          temperature: -40
          load: 0.5
          input_voltage: 4.5
        value: 3.3
        accuracy: {pct_reading: 5.0}

      - when:
          temperature: 85
          load: 1.0
          input_voltage: 5.5
        value: 3.3
        accuracy: {pct_reading: 6.0}

  # DUT INPUT (current draw): uses LE comparator (upper limit only)
  quiescent_current:
    function: dc_current
    direction: input
    units: A
    net: "IIN"
    datasheet_ref: "DS-001 Section 7.4"
    specs:
      - when:
          temperature: 25
          load: 0
        value: 0.010

      - when:
          temperature: 85
          load: 0
        value: 0.015

  # Efficiency characteristic (derived measurement)
  efficiency:
    function: dc_power
    direction: output
    units: "%"
    pins: [VIN, VOUT]
    datasheet_ref: "DS-001 Section 7.5"
    specs:
      - when:
          temperature: 25
          load: 0.5
        value: 85

      - when:
          temperature: 25
          load: 1.0
        value: 80
