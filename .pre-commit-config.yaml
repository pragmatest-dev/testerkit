# See https://pre-commit.com for usage and configuration
#
# Install hooks once per clone:
#     uv run pre-commit install
#
# Run against all files (e.g. after editing config):
#     uv run pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  # Pyright runs against the project's own venv so it sees the full
  # resolved dependency tree (including pydantic, pyarrow, etc.).
  # Using `local` + `uv run` avoids duplicating the dep set in a
  # mirror repo and guarantees identical behavior to CI.
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: pytest
        name: pytest
        entry: uv run pytest -q --benchmark-disable
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]

      # Verify reference docs match what the generators would produce
      # from current source. Drift fails the commit; regenerate with
      # `uv run python scripts/generate_reference_docs.py --all`.
      - id: reference-docs-drift
        name: reference-docs-drift
        entry: uv run python scripts/generate_reference_docs.py --all --check
        language: system
        files: ^(scripts/generate_reference_docs\.py|src/litmus/(data/(events|models)\.py|models/.*\.py|api/app\.py|mcp/server\.py|cli\.py|grafana/cli\.py)|docs/reference/(event-types|models|configuration|api|cli)\.md)$
        pass_filenames: false
        require_serial: true
