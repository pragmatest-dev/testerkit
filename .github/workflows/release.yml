name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  correctness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-extras --dev
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run pyright
      - name: Tests (correctness)
        run: uv run pytest -q

  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-extras --dev
      - name: "Smoke: litmus init --starter"
        run: |
          cd /tmp
          uv run litmus init smoke_project --starter --no-git --name smoke_test
          test -f /tmp/smoke_project/litmus.yaml
          test -f /tmp/smoke_project/tests/test_example.py
          test -f /tmp/smoke_project/stations/starter_station.yaml
      - name: "Smoke: pytest with mock instruments"
        run: |
          cd /tmp/smoke_project
          uv run --project ${{ github.workspace }} pytest tests/ -q \
            --station=starter_station \
            --mock-instruments --uut-serial=SMOKE001
      - name: "Smoke: litmus runs"
        run: |
          cd /tmp/smoke_project
          uv run --project ${{ github.workspace }} litmus runs 2>&1 | head -20
      - name: "Smoke: litmus data reindex"
        run: |
          cd /tmp/smoke_project
          uv run --project ${{ github.workspace }} litmus data reindex

  upgrade-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install previous release and generate data
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag — skipping upgrade test"
            exit 0
          fi
          # Restore uv.lock before each version-switching checkout —
          # ``uv sync``/``uv run`` may rewrite it, which blocks
          # ``git checkout <ref>``.
          git restore uv.lock
          git checkout "$PREV_TAG"
          uv sync --all-extras --dev
          mkdir -p /tmp/upgrade_project
          uv run litmus init /tmp/upgrade_project --starter --no-git --name upgrade_test || true
          if [ -f /tmp/upgrade_project/tests/test_example.py ]; then
            cd /tmp/upgrade_project
            uv run --project ${{ github.workspace }} pytest tests/ -q \
              --station=starter_station \
              --mock-instruments --uut-serial=UPGRADE001 || true
          fi
          git restore uv.lock
          git checkout "${GITHUB_REF_NAME}"
      - name: Install current and verify old data readable
        run: |
          if [ ! -f /tmp/upgrade_project/litmus.yaml ]; then
            echo "No previous project — skipping"
            exit 0
          fi
          uv sync --all-extras --dev
          uv run litmus data reindex --data-dir /tmp/upgrade_project/results || true
          uv run litmus runs --data-dir /tmp/upgrade_project/results 2>&1 | head -20

  publish-pypi:
    needs: [build, correctness, smoke-test, upgrade-test]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/litmus-test
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent: a release may already exist (e.g. created by hand
          # before the workflow ran). Create it, or fall back to attaching
          # the artifacts to the existing one.
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/* \
          || gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
