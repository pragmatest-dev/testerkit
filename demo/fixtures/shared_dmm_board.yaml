id: shared_dmm_board_v1
name: Shared DMM Board Test Fixture
description: >
  Two-slot fixture where both DUTs share a single DMM through a relay
  matrix. The PSU has two channels (one per slot, direct-wired). The
  DMM is routed to each slot's measurement points via different matrix
  channels, enabling parallel multi-DUT testing with one shared meter.
product_id: power_board

slots:
  slot_1:
    description: Left-side board — DMM via matrix rows 0-1
    points:
      vin_supply:
        name: vin_supply
        dut_pin: J1_VIN
        net: VIN_5V
        instrument: psu
        instrument_channel: CH1
        instrument_terminal: hi
        description: 5V input from PSU channel 1 (direct-wired)

      vout_measure:
        name: vout_measure
        dut_pin: VOUT
        net: VOUT_3V3
        instrument: dmm
        instrument_channel: "1"
        instrument_terminal: hi
        description: Output voltage — shared DMM routed through matrix
        route:
          switch: matrix
          channels: ["r0c0"]
          settling_ms: 10

      iout_measure:
        name: iout_measure
        dut_pin: IOUT
        net: IOUT_SENSE
        instrument: dmm
        instrument_channel: "1"
        instrument_terminal: hi
        description: Output current — shared DMM routed through matrix
        route:
          switch: matrix
          channels: ["r1c0"]
          settling_ms: 10

  slot_2:
    description: Right-side board — DMM via matrix rows 2-3
    points:
      vin_supply:
        name: vin_supply
        dut_pin: J1_VIN
        net: VIN_5V
        instrument: psu
        instrument_channel: CH2
        instrument_terminal: hi
        description: 5V input from PSU channel 2 (direct-wired)

      vout_measure:
        name: vout_measure
        dut_pin: VOUT
        net: VOUT_3V3
        instrument: dmm
        instrument_channel: "1"
        instrument_terminal: hi
        description: Output voltage — shared DMM routed through matrix
        route:
          switch: matrix
          channels: ["r2c0"]
          settling_ms: 10

      iout_measure:
        name: iout_measure
        dut_pin: IOUT
        net: IOUT_SENSE
        instrument: dmm
        instrument_channel: "1"
        instrument_terminal: hi
        description: Output current — shared DMM routed through matrix
        route:
          switch: matrix
          channels: ["r3c0"]
          settling_ms: 10
