id: dual_power_board_v1
name: Dual Power Board Test Fixture
description: >
  Two-slot fixture for parallel testing of two power boards.
  Each slot uses a different channel on shared instruments (PSU, DMM).
  Demonstrates multi-DUT testing where shared instruments are served
  via InstrumentServer with per-resource locking.
product_id: power_board
product_revision: A
slots:
  slot_1:
    description: Left-side board
    points:
      vin_supply:
        name: vin_supply
        dut_pin: J1_VIN
        net: VIN_5V
        instrument: psu
        instrument_channel: CH1
        instrument_terminal: hi
        description: 5V input from PSU channel 1
      gnd_psu:
        name: gnd_psu
        dut_pin: J1_GND
        net: GND
        instrument: psu
        instrument_channel: CH1
        instrument_terminal: lo
      vout_measure:
        name: vout_measure
        dut_pin: TP_VOUT
        net: VOUT_3V3
        instrument: dmm
        instrument_channel: '1'
        instrument_terminal: hi
        description: Output voltage via DMM channel 1
      gnd_dmm:
        name: gnd_dmm
        dut_pin: TP_GND
        net: GND
        instrument: dmm
        instrument_channel: '1'
        instrument_terminal: lo
  slot_2:
    description: Right-side board
    points:
      vin_supply:
        name: vin_supply
        dut_pin: J1_VIN
        net: VIN_5V
        instrument: psu
        instrument_channel: CH2
        instrument_terminal: hi
        description: 5V input from PSU channel 2
      gnd_psu:
        name: gnd_psu
        dut_pin: J1_GND
        net: GND
        instrument: psu
        instrument_channel: CH2
        instrument_terminal: lo
      vout_measure:
        name: vout_measure
        dut_pin: TP_VOUT
        net: VOUT_3V3
        instrument: dmm
        instrument_channel: '2'
        instrument_terminal: hi
        description: Output voltage via DMM channel 2
      gnd_dmm:
        name: gnd_dmm
        dut_pin: TP_GND
        net: GND
        instrument: dmm
        instrument_channel: '2'
        instrument_terminal: lo
