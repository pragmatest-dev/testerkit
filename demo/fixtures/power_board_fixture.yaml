id: power_board_fixture_v1
name: Power Board Test Fixture Rev 1
description: Pogo-pin fixture for Demo Power Board Rev A
product_id: power_board
product_revision: A
points:
  vin_supply:
    name: vin_supply
    dut_pin: J1_VIN
    net: VIN_5V
    instrument: psu
    instrument_channel: '1'
    instrument_terminal: hi
    description: 5V input from PSU channel 1
  gnd_psu:
    name: gnd_psu
    dut_pin: J1_GND
    net: GND
    instrument: psu
    instrument_channel: '1'
    instrument_terminal: lo
    description: Ground return to PSU CH1 LO terminal
  gnd_eload:
    name: gnd_eload
    dut_pin: J1_GND
    net: GND
    instrument: eload
    instrument_channel: '1'
    instrument_terminal: lo
    description: Ground return to eload LO terminal
  vout_measure:
    name: vout_measure
    dut_pin: TP_VOUT
    net: VOUT_3V3
    instrument: dmm
    instrument_channel: '1'
    instrument_terminal: hi
    description: Output voltage measurement via DMM
  vin_measure:
    name: vin_measure
    dut_pin: TP_VIN
    net: VIN_5V
    instrument: dmm
    instrument_channel: '2'
    instrument_terminal: hi
    description: Input voltage sense via DMM ch2
  load_output:
    name: load_output
    dut_pin: J1_VOUT
    net: VOUT_3V3
    instrument: eload
    instrument_channel: '1'
    instrument_terminal: hi
    description: Electronic load on output
  gnd_dmm:
    name: gnd_dmm
    dut_pin: TP_GND
    net: GND
    instrument: dmm
    instrument_channel: '1'
    instrument_terminal: lo
    description: Ground reference to DMM LO terminal
