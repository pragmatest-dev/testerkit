# Demo sequence showing operator dialogs
sequence:
  id: dialog_demo
  name: "Dialog Demo"
  description: "Demonstrates operator dialogs during test execution"
  test_phase: demo

  steps:
    - id: confirm_dut
      test: tests/test_dialog_demo.py::test_with_confirm_dialog
      description: "Confirm DUT is ready"

    - id: get_serial
      test: tests/test_dialog_demo.py::test_with_input_dialog
      description: "Get serial number from operator"

    - id: select_fixture
      test: tests/test_dialog_demo.py::test_with_choice_dialog
      description: "Select test fixture"
