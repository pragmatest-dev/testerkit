# Chroma 63103A — programmable 3-channel electronic load.
# Loads each PMIC rail independently in the advanced demo.
id: chroma_63103a
manufacturer: Chroma
model: "63103A"
name: Chroma 63103A Programmable DC Electronic Load
description: Three-channel electronic load; one channel per PMIC rail.
type: eload
interfaces: [lan, gpib]
driver: demo.drivers.ELoad
channels:
  "1":
    terminals: [hi, lo]
    connector: binding_post
    ground: floating
  "2":
    terminals: [hi, lo]
    connector: binding_post
    ground: floating
  "3":
    terminals: [hi, lo]
    connector: binding_post
    ground: floating
capabilities:
  - function: dc_current
    direction: input
    signals:
      current: {range: {min: 0, max: 20, units: A}}
    channels: ["1", "2", "3"]
