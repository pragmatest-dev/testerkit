# Fixture: routes PMIC-A23 pins to the bench_alpha station instruments.
# Direct-wired (no switch routing) — each rail gets its own DMM channel and
# eload channel.
id: pmic_a23_bench
name: PMIC-A23 Bench Fixture
description: Direct-wired pogo fixture, one DMM/eload channel per rail.
product_id: pmic_a23
product_revision: B

points:
  # Supply side.
  vin_supply:
    name: vin_supply
    dut_pin: J1_VIN
    net: VIN_5V
    instrument: psu
    instrument_channel: CH1
    instrument_terminal: hi
  vin_return:
    name: vin_return
    dut_pin: J1_GND
    net: GND
    instrument: psu
    instrument_channel: CH1
    instrument_terminal: lo

  # DMM per rail (each on its own channel for simultaneous readback).
  vin_sense:
    name: vin_sense
    dut_pin: TP_VIN_SENSE
    net: VIN_5V
    instrument: dmm
    instrument_channel: "1"
    instrument_terminal: hi
  rail_3v3:
    name: rail_3v3
    dut_pin: TP_3V3
    net: VOUT_3V3
    instrument: dmm
    instrument_channel: "2"
    instrument_terminal: hi
  rail_1v8:
    name: rail_1v8
    dut_pin: TP_1V8
    net: VOUT_1V8
    instrument: dmm
    instrument_channel: "3"
    instrument_terminal: hi
  rail_1v2:
    name: rail_1v2
    dut_pin: TP_1V2
    net: VOUT_1V2
    instrument: dmm
    instrument_channel: "4"
    instrument_terminal: hi

  # ELoad per rail.
  load_3v3:
    name: load_3v3
    dut_pin: TP_3V3
    net: VOUT_3V3
    instrument: eload
    instrument_channel: "1"
    instrument_terminal: hi
  load_1v8:
    name: load_1v8
    dut_pin: TP_1V8
    net: VOUT_1V8
    instrument: eload
    instrument_channel: "2"
    instrument_terminal: hi
  load_1v2:
    name: load_1v2
    dut_pin: TP_1V2
    net: VOUT_1V2
    instrument: eload
    instrument_channel: "3"
    instrument_terminal: hi
