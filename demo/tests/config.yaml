# Test Configuration: Power Board Tests
#
# This file defines CONDITIONS (vectors) and LIMITS (pass/fail criteria)
# for all test functions. The @litmus_test decorator auto-loads this file.
#
# KEY CONCEPTS:
# - VECTORS: Test conditions (stimulus parameters like voltage, load)
# - LIMITS: Pass/fail criteria (derived from product spec with guardbands)
# - RETRY: Automatic retry on failure
# - DIALOGS: Operator prompts before/during tests
# - _MOCK: Per-vector mock outputs for simulation mode
#
# MOCK CONFIGURATION (_mock):
# When running with --mock-instruments, _mock values configure what mock instruments return.
# - Vector-level _mock: Different outputs per test condition
# - Test-level _mock: Constant outputs for all vectors
# - Fallback: Uses limit nominal value if no _mock specified
#
# All values trace back to: products/power_board/spec.yaml

# =============================================================================
# Pattern 1: Single Vector (simple test) - Test-level _mock
# =============================================================================
test_output_voltage_no_load:
  description: "Verify 3.3V output at no load"
  vectors:
    - vin: 5.0
  # Test-level _mock: constant for all vectors (single vector here)
  _mock:
    dmm.measure_voltage: 3.3
    psu.measure_current: 0.005  # 5mA quiescent current
  limits:
    test_output_voltage_no_load:
      low: 3.234       # 3.3V - 2% spec - 10% guardband
      high: 3.366      # 3.3V + 2% spec + 10% guardband
      nominal: 3.3
      units: V
      spec_ref: "output_voltage @ load=0.1A, temp=25C"
      comparator: GELE  # >= low AND <= high (IEEE 1671)

# =============================================================================
# Pattern 2: Single Vector with Retry - Test-level _mock
# =============================================================================
test_output_voltage_full_load:
  description: "Verify 3.3V output at full 800mA load"
  vectors:
    - vin: 5.0
      load_current: 0.8
  _mock:
    dmm.measure_voltage: 3.28   # Voltage drops slightly under full load
    psu.measure_current: 0.85   # Input current at full load
  retry:
    max_attempts: 3
    delay_seconds: 0.5
  limits:
    test_output_voltage_full_load:
      low: 3.201       # 3.3V - 3% spec (full load tolerance)
      high: 3.399
      nominal: 3.3
      units: V
      spec_ref: "output_voltage @ load=0.8A, temp=25C"

# =============================================================================
# Pattern 3: Explicit Vector List (load sweep) - Per-vector _mock
# =============================================================================
test_load_regulation:
  description: "Measure output at multiple load points"
  vectors:
    # Per-vector _mock: different outputs for each load condition
    - vin: 5.0
      load_current: 0.1
      expected_dropout: 0
      _mock:
        dmm.measure_voltage: 3.32   # Slight increase at light load
        psu.measure_current: 0.15
    - vin: 5.0
      load_current: 0.4
      expected_dropout: 2
      _mock:
        dmm.measure_voltage: 3.30   # Nominal at medium load
        psu.measure_current: 0.45
    - vin: 5.0
      load_current: 0.8
      expected_dropout: 5
      _mock:
        dmm.measure_voltage: 3.28   # Drops at full load
        psu.measure_current: 0.85
  limits:
    test_load_regulation:
      low: 3.2
      high: 3.4
      nominal: 3.3
      units: V
      spec_ref: "output_voltage over load range"

# =============================================================================
# Pattern 4: Product Expansion (Cartesian product)
# Creates 3 x 3 = 9 test vectors
# =============================================================================
test_load_sweep:
  description: "Sweep VIN and load - product expansion"
  vectors:
    expand: product
    vin: [4.75, 5.0, 5.5]         # Input voltage range
    load_current: [0.1, 0.4, 0.8]  # Load current range
  limits:
    test_load_sweep:
      low: 3.1
      high: 3.5
      nominal: 3.3
      units: V
      spec_ref: "output_voltage - line/load regulation"

# =============================================================================
# Pattern 5: Nested Loops with Change Detection
# Outer loop: temperature (slowest changing)
# Inner loop: load_current (fastest changing)
# =============================================================================
test_temp_load_matrix:
  description: "Full characterization matrix"
  vectors:
    expand: nested
    loops:
      - name: temperature
        values: [25, 85]
      - name: load_current
        values: [0.1, 0.5, 0.8]
  limits:
    test_temp_load_matrix:
      low: 3.0           # Wide limits for characterization
      high: 3.6
      nominal: 3.3
      units: V
      spec_ref: "output_voltage - characterization"

# =============================================================================
# Pattern 6: Range Expansion (SCPI-style)
# =============================================================================
test_line_regulation:
  description: "Sweep input voltage from 4.5V to 6V"
  vectors:
    expand: range
    name: vin
    start: 4.5
    stop: 6.0
    step: 0.5
  limits:
    test_line_regulation:
      low: 3.2
      high: 3.4
      nominal: 3.3
      units: V
      spec_ref: "line regulation"

# =============================================================================
# Pattern 7: Multiple Measurements (dict return) - _mock for power calculation
# =============================================================================
test_power_analysis:
  description: "Measure input and output power"
  vectors:
    - vin: 5.0
      load_current: 0.5
  _mock:
    # Mock values chosen so efficiency calculation passes:
    # P_in = 5.0V * 0.5A = 2.5W
    # P_out = 3.3V * 0.5A = 1.65W
    # Efficiency = 1.65/2.5 * 100 = 66%
    dmm.measure_voltage: 3.3    # Output voltage
    psu.measure_current: 0.5    # Input current
  limits:
    # Each key in the returned dict gets its own limit
    input_power:
      low: 0
      high: 5.0
      nominal: 2.0
      units: W
    output_power:
      low: 0
      high: 3.0
      nominal: 1.65
      units: W
    efficiency:
      low: 60
      high: 100
      nominal: 66
      units: "%"
      spec_ref: "efficiency @ vin=5V, load=0.5A"

# =============================================================================
# Pattern 8: Quiescent Current - _mock for current measurement
# =============================================================================
test_quiescent_current:
  description: "Verify low standby current"
  vectors:
    - vin: 5.0
  _mock:
    psu.measure_current: 0.005  # 5mA quiescent - well below 10mA limit
  limits:
    test_quiescent_current:
      low: 0
      high: 10          # Spec max: 10mA
      nominal: 5
      units: mA
      comparator: LE    # Only upper limit matters
      spec_ref: "quiescent_current @ no load"

# =============================================================================
# Pattern 9: Streaming Measurements (yield) - _mock for stability
# =============================================================================
test_stability_over_time:
  description: "Monitor output stability for 5 seconds"
  vectors:
    - vin: 5.0
      load_current: 0.5
      sample_count: 5
  _mock:
    dmm.measure_voltage: 3.3    # Stable output for all samples
  limits:
    voltage:
      low: 3.25
      high: 3.35
      nominal: 3.3
      units: V
      spec_ref: "output stability"

# =============================================================================
# Pattern 10: Operator Dialog Before Test - _mock for shutdown condition
# =============================================================================
test_thermal_shutdown:
  description: "Verify thermal protection"
  prompt_before:
    message: "Apply heat gun to U1 until thermal shutdown triggers"
    type: confirm
  vectors:
    - vin: 5.0
      load_current: 0.5
  _mock:
    dmm.measure_voltage: 0.05   # Output collapsed after thermal shutdown
  limits:
    test_thermal_shutdown:
      low: 0
      high: 0.1
      nominal: 0
      units: V
      spec_ref: "thermal shutdown - output should collapse"

# =============================================================================
# Pattern 11: Waveform Capture (Oscilloscope) - _mock with Waveform data
# =============================================================================
test_output_ripple:
  description: "Measure output ripple with oscilloscope"
  vectors:
    - vin: 5.0
      load_current: 0.5
  _mock:
    # Scope.fetch_waveform returns (samples, dt) tuple
    # Samples: 3.3V baseline with ~30mV ripple (well below 50mV limit)
    scope.fetch_waveform:
      - [3.285, 3.290, 3.300, 3.310, 3.315, 3.310, 3.300, 3.290, 3.285, 3.290]
      - 0.00001  # dt: 10µs sample interval (100kHz)
  limits:
    test_output_ripple:
      low: 0
      high: 50        # Max 50mV peak-to-peak ripple
      nominal: 30
      units: mV
      comparator: LE
      spec_ref: "output ripple @ 500mA load"

# =============================================================================
# Pattern 12: Callable Limits (temperature-dependent)
# The limit varies based on temperature condition from the vector
# =============================================================================
test_output_voltage_temp:
  description: "Verify output voltage with temperature-dependent limits"
  vectors:
    expand: product
    temperature: [-40, 25, 85]
    vin: [5.0]
  _mock:
    dmm.measure_voltage: 3.3
  limits:
    # Callable limit: adjusts based on temperature condition
    # Inline Python has access to: ctx, Limit
    test_output_voltage_temp:
      callable: |
        temp = ctx.get_in("temperature")
        if temp < 0:
          # Cold: wider tolerance
          return Limit(low=3.15, high=3.45, units="V")
        elif temp < 50:
          # Room temp: tight tolerance
          return Limit(low=3.25, high=3.35, units="V")
        else:
          # Hot: wider tolerance
          return Limit(low=3.10, high=3.50, units="V")

# =============================================================================
# Pattern 13: Context Traceability (configure/observe)
# Shows full signal chain traceability with environmental data
# =============================================================================
test_efficiency_with_context:
  description: "Efficiency test with full context traceability"
  vectors:
    # Use explicit list to provide per-vector mock values for realistic efficiency
    - vin: 5.0
      load_current: 0.5
      _mock:
        psu.measure_voltage: 5.0
        psu.measure_current: 0.55    # Input current slightly higher than output
        dmm.measure_voltage: 3.3
  limits:
    input_power:
      low: 0
      high: 6.0
      units: W
    output_power:
      low: 0
      high: 4.0
      units: W
    efficiency:
      low: 55
      high: 100
      nominal: 60
      units: "%"
      spec_ref: "efficiency across line/load"
