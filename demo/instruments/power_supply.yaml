# Power Supply — instrument type definition
# Capabilities based on typical bench DC PSU (e.g., Keysight E36312A, Rigol DP832)

instrument:
  type: psu
  name: DC Power Supply
  description: Programmable DC power supply for sourcing voltage and current to DUT
  icon: bolt
  channels:
    "CH1": {terminals: [hi, lo], connector: binding_post, ground: floating}
    "CH2": {terminals: [hi, lo], connector: binding_post, ground: floating}

capabilities:
  - function: dc_voltage
    direction: output
    parameters:
      voltage:
        range: {min: 0, max: 30, units: V}
      current:
        range: {min: 0, max: 5, units: A}
    channels: ["CH1", "CH2"]

  - function: dc_current
    direction: output
    parameters:
      current:
        range: {min: 0, max: 5, units: A}
      voltage:
        range: {min: 0, max: 30, units: V}
    channels: ["CH1", "CH2"]

  # Voltage readback (measure) — built-in meter
  - function: dc_voltage
    direction: input
    readback: true
    parameters:
      voltage:
        range: {min: 0, max: 30, units: V}
    channels: ["CH1", "CH2"]

  # Current readback (measure) — built-in meter
  - function: dc_current
    direction: input
    readback: true
    parameters:
      current:
        range: {min: 0, max: 5, units: A}
    channels: ["CH1", "CH2"]
