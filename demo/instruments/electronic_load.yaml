# Electronic Load — instrument type definition
# Capabilities based on typical DC eload (e.g., BK Precision 8500, Rigol DL3021)

instrument:
  type: electronic_load
  name: DC Electronic Load
  description: Programmable DC electronic load for sinking current from DUT outputs
  icon: downloading
  channels:
    "1": {terminals: [hi, lo], connector: binding_post, ground: shared}

capabilities:
  - function: dc_current
    direction: input
    parameters:
      current:
        range: {min: 0, max: 30, units: A}
    modes: [constant_current]

  - function: dc_voltage
    direction: input
    parameters:
      voltage:
        range: {min: 0, max: 150, units: V}
