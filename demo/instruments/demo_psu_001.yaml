# Demo Power Supply Configuration
# This file defines the instrument identity and calibration for a specific PSU asset.
# The station file references this instrument by ID and specifies its resource address.

id: demo_psu_001
catalog_ref: generic_psu
protocol: visa
driver: demo.drivers.PSU

# Expected identity - verified against device at runtime
# If the serial number doesn't match, Litmus will warn about a potential swap
info:
  manufacturer: Demo Instruments
  model: PSU-5000
  serial: PSU001
  firmware: "1.0"

# Calibration tracking - from your organization's cal management system
# Litmus will warn if calibration is due or expired
calibration:
  due_date: 2026-06-15
  last_cal: 2025-06-15
  certificate: CAL-2025-001
  lab: Acme Calibration Services
