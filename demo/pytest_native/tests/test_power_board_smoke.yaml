# Unified sidecar for test_power_board_smoke.py.
#
# Three optional blocks:
#   vectors: compiled into @pytest.mark.parametrize at collection time
#   limits:  pushed into the active-limits ContextVar around each test;
#            `logger.measure(name, value)` auto-resolves by name
#   mocks:   dotted `<fixture>.<attr>` → return value; installed around
#            the test via `unittest.mock.patch.object`
vectors:
  methods:
    test_basic_power:
      list:
        - {vin: 5.0}
    test_load_test:
      list:
        - {vin: 5.0, load_current: 0.8}
    test_quiescent:
      list:
        - {vin: 5.0}
    test_regulation_sweep:
      product:
        vin: [4.5, 4.75, 5.0, 5.25, 5.5]
        load_current: [0.1, 0.25, 0.4, 0.6, 0.8]
limits:
  # Spec-backed characteristics — resolve against the product YAML.
  output_voltage: {ref: output_voltage}
  quiescent_current: {ref: quiescent_current}
  # Test-procedure-only limits — no product characteristic.
  output_voltage_load:
    low: 3.201
    high: 3.399
    nominal: 3.3
    units: V
  output_voltage_sweep:
    low: 3.1
    high: 3.5
    nominal: 3.3
    units: V
