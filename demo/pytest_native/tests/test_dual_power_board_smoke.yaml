# Pytest-native port of demo/sequences/dual_power_board_smoke.yaml.
vectors:
  methods:
    test_power_up:
      list:
        - {vin: 5.0}
    test_output_voltage_synced:
      list:
        - {vin: 5.0}
    test_efficiency:
      list:
        - {vin: 5.0, load_current: 0.5}
limits:
  startup_current:
    high: 50
    nominal: 5
    units: mA
    comparator: LE
  efficiency: {ref: efficiency}
  output_voltage: {ref: output_voltage}
