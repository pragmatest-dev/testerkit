# Demo Station Configuration
# Uses mock instruments for demonstration without real hardware
#
# Each instrument specifies:
# - driver: Python import path to the instrument class
# - resource: VISA address (used for real hardware)
# - mock_config: Values returned by Mock when simulating

station:
  id: "demo_station_001"
  name: "Demo Test Station"
  location: "Virtual Lab"
  description: "Simulated station for demonstrating Litmus capabilities"

instruments:
  psu:
    driver: demo.drivers.PSU
    resource: "TCPIP::192.168.1.101::INSTR"
    simulate: true
    description: "Power supply for DUT input power"
    mock_config:
      measure_voltage: 5.0
      measure_current: 0.25

  dmm:
    driver: demo.drivers.DMM
    resource: "TCPIP::192.168.1.102::INSTR"
    simulate: true
    description: "DMM for output voltage measurement"
    mock_config:
      measure_voltage: 3.3
      measure_dc_voltage: 3.3
      measure_current: 0.0
      measure_dc_current: 0.0
      measure_resistance: 1000.0

  eload:
    driver: demo.drivers.ELoad
    resource: "TCPIP::192.168.1.103::INSTR"
    simulate: true
    description: "Electronic load for output loading"
    mock_config:
      measure_current: 0.5
      measure_voltage: 3.3

  scope:
    driver: demo.drivers.Scope
    resource: "TCPIP::192.168.1.104::INSTR"
    simulate: true
    description: "Oscilloscope for waveform capture"
    mock_config:
      # fetch_waveform returns [samples, dt] as a list
      # Default: 5 samples at 3.3V, 10µs interval
      fetch_waveform:
        - [3.3, 3.31, 3.29, 3.30, 3.31]
        - 0.00001

# Test phases this station supports
supported_phases:
  - validation
  - production
  - debug
