id: demo_station_001
name: Demo Test Station
location: Virtual Lab
description: Mock station for demonstrating Litmus capabilities
instruments:
  psu:
    type: psu
    driver: demo.drivers.PSU
    resource: TCPIP::192.168.1.101::INSTR
    catalog_ref: keysight_e36313a
    mock: true
    channels:
    - '1'
    - '2'
    description: Dual-output power supply for DUT input power
    mock_config:
      measure_voltage: 5.0
      measure_current: 0.25
  dmm:
    type: dmm
    driver: demo.drivers.DMM
    resource: TCPIP::192.168.1.102::INSTR
    catalog_ref: keysight_34461a
    mock: true
    channels:
    - '1'
    description: DMM for output voltage measurement
    mock_config:
      measure_voltage: 3.3
      measure_dc_voltage: 3.3
      measure_current: 0.0
      measure_dc_current: 0.0
      measure_resistance: 1000.0
  eload:
    type: eload
    driver: demo.drivers.ELoad
    resource: TCPIP::192.168.1.103::INSTR
    catalog_ref: generic_eload
    mock: true
    channels:
    - '1'
    description: Electronic load for output loading
    mock_config:
      measure_current: 0.5
      measure_voltage: 3.3
  fast_dmm:
    type: dmm
    driver: demo.drivers.DMM
    resource: TCPIP::192.168.1.105::INSTR
    catalog_ref: generic_dmm
    mock: true
    description: Fast 4.5-digit DMM for quick screening
    mock_config:
      measure_voltage: 3.28
      measure_dc_voltage: 3.28
      measure_current: 0.0
      measure_dc_current: 0.0
      measure_resistance: 1000.0
  scope:
    type: scope
    driver: demo.drivers.Scope
    resource: TCPIP::192.168.1.104::INSTR
    catalog_ref: rigol_ds1104z
    mock: true
    channels:
    - '1'
    - '2'
    - '3'
    - '4'
    description: 4-channel oscilloscope for waveform capture
    mock_config:
      fetch_waveform:
      - - 3.3
        - 3.31
        - 3.29
        - 3.3
        - 3.31
      - 1.0e-05
supported_phases:
- validation
- production
- debug
