# Minimal spec for testing - simplest valid product specification
product:
  id: minimal_board
  name: "Minimal Test Board"
  revision: "1.0"

pins:
  VOUT:
    name: "TP1"

characteristics:
  output_voltage:
    function: dc_voltage
    direction: output
    units: V
    pins: [VOUT]
    specs:
      - value: 3.3
        accuracy: {pct_reading: 5.0}
