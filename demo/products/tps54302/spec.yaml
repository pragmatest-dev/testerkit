# TPS54302 Product Specification
# Based on TI datasheet SLVSDG6B (May 2016, Rev April 2021)
#
# This spec is for a BOARD using the TPS54302, not just the IC.
# The IC has 6 pins: GND, SW, VIN, FB, EN, BOOT
# The board has test points for measuring the regulated output.

product:
  id: tps54302
  name: "TPS54302 3A Synchronous Buck Converter Module"
  revision: "A"
  datasheet: "SLVSDG6B"
  description: "4.5V-28V input to 3.3V output DC-DC converter, 3A max"

# Physical interface
# IC pins + board-level test points
pins:
  # TPS54302 IC pins (accent the real pinout)
  VIN:
    name: "Pin 3"
    net: "VIN"
    type: power
    description: "IC pin 3 - Input supply (4.5V to 28V)"
  GND:
    name: "Pin 1"
    net: "GND"
    type: ground
    description: "IC pin 1 - Ground reference"
  SW:
    name: "Pin 2"
    net: "SW"
    type: signal
    description: "IC pin 2 - Switch node (to inductor)"
  FB:
    name: "Pin 4"
    net: "FB"
    type: signal
    description: "IC pin 4 - Feedback input (0.6V reference)"
  EN:
    name: "Pin 5"
    net: "EN"
    type: signal
    description: "IC pin 5 - Enable with UVLO"
  BOOT:
    name: "Pin 6"
    net: "BOOT"
    type: signal
    description: "IC pin 6 - Bootstrap for high-side gate drive"

  # Board-level test points (not IC pins)
  TP_VOUT:
    name: "TP1"
    net: "VOUT_3V3"
    type: signal
    description: "Test point - Regulated output after LC filter"
  TP_IIN:
    name: "TP2"
    net: "IIN_SENSE"
    type: signal
    description: "Test point - Input current sense resistor"

# Electrical characteristics from datasheet
characteristics:
  # Input Supply (VIN pin) - Section 7.3
  input_voltage_range:
    direction: input
    domain: voltage
    signal_types: [dc]
    units: V
    pin: VIN
    datasheet_ref: "Table 7-1, VIN"
    conditions:
      - nominal: 12
        limit_low: 4.5
        limit_high: 28
        description: "Operating input voltage range"

  # Quiescent Current (measured at VIN) - Section 7.5
  quiescent_current:
    direction: input
    domain: current
    signal_types: [dc]
    units: uA
    pin: VIN
    datasheet_ref: "Table 7-5, IQ"
    conditions:
      - ven: 2.0
        comparator: LE
        nominal: 45
        limit_high: 70
        description: "Non-switching, VEN=2V, VIN=12V"
      - ven: 0
        comparator: LE
        nominal: 2
        limit_high: 5
        description: "Shutdown current, VEN=0V"

  # Feedback Voltage (FB pin) - Section 7.5
  feedback_voltage:
    direction: input
    domain: voltage
    signal_types: [dc]
    units: V
    pin: FB
    datasheet_ref: "Table 7-5, VFB"
    conditions:
      - temperature: 25
        nominal: 0.596
        tolerance_pct: 1
        description: "FB regulation voltage, TA=25C"
      - temperature: -40
        nominal: 0.596
        tolerance_pct: 1.5
        description: "FB regulation voltage, TA=-40C"
      - temperature: 125
        nominal: 0.596
        tolerance_pct: 1.5
        description: "FB regulation voltage, TA=125C"

  # Enable Threshold (EN pin) - Section 7.5
  enable_threshold_rising:
    direction: input
    domain: voltage
    signal_types: [dc]
    units: V
    pin: EN
    datasheet_ref: "Table 7-5, VEN"
    conditions:
      - nominal: 1.2
        limit_low: 1.0
        limit_high: 1.4
        description: "EN rising threshold"

  enable_threshold_falling:
    direction: input
    domain: voltage
    signal_types: [dc]
    units: V
    pin: EN
    datasheet_ref: "Table 7-5, VEN"
    conditions:
      - nominal: 1.1
        limit_low: 0.9
        limit_high: 1.3
        description: "EN falling threshold (hysteresis)"

  # Output Voltage (board test point, after LC filter)
  # This is what the user actually cares about testing
  output_voltage:
    direction: output
    domain: voltage
    signal_types: [dc]
    units: V
    pin: TP_VOUT
    datasheet_ref: "Application, VOUT = VFB * (1 + R1/R2)"
    conditions:
      # Calculated from FB accuracy and resistor divider
      # VOUT = 0.6V * (1 + 4.53k/1k) = 3.318V nominal
      - temperature: 25
        load: 0.5
        nominal: 3.3
        tolerance_pct: 2
        description: "Output at 0.5A load"
      - temperature: 25
        load: 3.0
        nominal: 3.3
        tolerance_pct: 3
        description: "Output at 3A full load"
      - temperature: 85
        load: 3.0
        nominal: 3.3
        tolerance_pct: 4
        description: "Output at hot, full load"

  # Output Ripple (board test point)
  output_ripple:
    direction: output
    domain: voltage
    signal_types: [ac]
    units: mV
    pin: TP_VOUT
    datasheet_ref: "Application circuit"
    conditions:
      - load: 3.0
        cout: 47
        comparator: LE
        limit_high: 50
        description: "Peak-to-peak ripple at full load"

  # Switch Node (SW pin) - for waveform analysis
  switch_frequency:
    direction: output
    domain: frequency
    signal_types: [pulsed]
    units: kHz
    pin: SW
    datasheet_ref: "Table 7-5, fSW"
    conditions:
      - nominal: 400
        tolerance_pct: 10
        description: "Switching frequency"

  # Efficiency (calculated from VIN and VOUT measurements)
  efficiency:
    direction: output
    domain: power
    signal_types: [dc]
    units: "%"
    pins: [VIN, TP_VOUT, TP_IIN]
    datasheet_ref: "Figure 7-3, Efficiency curves"
    conditions:
      - vin: 12
        load: 0.5
        comparator: GE
        limit_low: 90
        description: "Efficiency at 12V in, 0.5A out"
      - vin: 12
        load: 3.0
        comparator: GE
        limit_low: 88
        description: "Efficiency at 12V in, 3A out"
      - vin: 5
        load: 3.0
        comparator: GE
        limit_low: 92
        description: "Efficiency at 5V in, 3A out"

# Test requirements
test_requirements:
  verify_feedback_voltage:
    characteristic_ref: feedback_voltage
    conditions:
      temperature: 25
    guardband_pct: 10
    priority: critical
    description: "Verify FB pin regulates to 0.6V"

  verify_output_voltage:
    characteristic_ref: output_voltage
    conditions:
      temperature: 25
      load: 0.5
    guardband_pct: 10
    priority: critical
    description: "Verify regulated output voltage"

  verify_output_full_load:
    characteristic_ref: output_voltage
    conditions:
      temperature: 25
      load: 3.0
    guardband_pct: 10
    priority: critical
    description: "Verify output at full load"

  verify_quiescent:
    characteristic_ref: quiescent_current
    conditions:
      ven: 2.0
    guardband_pct: 20
    priority: standard
    description: "Verify low quiescent current"

  verify_enable_threshold:
    characteristic_ref: enable_threshold_rising
    guardband_pct: 0
    priority: standard
    description: "Verify EN pin threshold"

  verify_switching_frequency:
    characteristic_ref: switch_frequency
    guardband_pct: 0
    priority: standard
    description: "Verify 400kHz switching"

  verify_efficiency:
    characteristic_ref: efficiency
    conditions:
      vin: 12
      load: 3.0
    guardband_pct: 5
    priority: standard
    description: "Verify power efficiency"
