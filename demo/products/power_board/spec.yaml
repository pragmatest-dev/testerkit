id: power_board
part_number: DPB-001
name: Demo Power Board Rev A
revision: A
description: 5V to 3.3V LDO regulator board, 800mA max
datasheet: docs/DS-DPB001.pdf
schematic: docs/SCH-DPB001.pdf
characteristics:
  input_voltage:
    function: dc_voltage
    direction: input
    units: V
    pin: TP_VIN
    datasheet_ref: TLV1117-33 Table 6.3
    specs:
    - value: 5.0
      accuracy:
        absolute: 0.25
      note: Operating input range (VOUT+1.4V to 15V)
  quiescent_current:
    function: dc_current
    direction: input
    units: mA
    pin: J1_VIN
    datasheet_ref: TLV1117-33 Table 6.5
    specs:
    - when:
        load:
          min: 0
          max: 0
      value: 5
      note: Ground current, no load
  output_voltage:
    function: dc_voltage
    direction: output
    units: V
    pin: TP_VOUT
    datasheet_ref: TLV1117-33 Table 6.5
    specs:
    - when:
        temperature:
          min: 25
          max: 25
        load:
          min: 0.1
          max: 0.1
      value: 3.3
      accuracy:
        pct_reading: 2.0
      note: Light load, room temp
    - when:
        temperature:
          min: 25
          max: 25
        load:
          min: 0.5
          max: 0.5
      value: 3.3
      accuracy:
        pct_reading: 2.0
      note: Half load
    - when:
        temperature:
          min: 25
          max: 25
        load:
          min: 0.8
          max: 0.8
      value: 3.3
      accuracy:
        pct_reading: 3.0
      note: Full load (800mA)
    - when:
        temperature:
          min: 85
          max: 85
        load:
          min: 0.8
          max: 0.8
      value: 3.3
      accuracy:
        pct_reading: 4.0
      note: Full load, hot
  load_regulation:
    function: dc_voltage
    direction: output
    units: mV
    pin: TP_VOUT
    datasheet_ref: TLV1117-33 Table 6.5
    specs:
    - when:
        load_min:
          min: 0.01
          max: 0.01
        load_max:
          min: 0.8
          max: 0.8
      value: 5
      note: VOUT change from 10mA to 800mA
  line_regulation:
    function: dc_voltage
    direction: output
    units: mV
    pin: TP_VOUT
    datasheet_ref: TLV1117-33 Table 6.5
    specs:
    - when:
        vin_min:
          min: 4.75
          max: 4.75
        vin_max:
          min: 10
          max: 10
      value: 3
      note: VOUT change from 4.75V to 10V input
  output_ripple:
    function: ac_voltage
    direction: output
    units: mV
    pin: TP_VOUT
    datasheet_ref: Application note
    conditions:
      bandwidth:
        range:
          min: 10
          max: 10e6
          units: Hz
    specs:
    - when:
        load:
          min: 0.5
          max: 0.5
      value: 25
      note: Output noise, 10Hz-10MHz
  dropout_voltage:
    function: dc_voltage
    direction: output
    units: V
    pins:
    - TP_VIN
    - TP_VOUT
    datasheet_ref: TLV1117-33 Table 6.5
    specs:
    - when:
        load:
          min: 0.8
          max: 0.8
      value: 1.1
      note: Dropout at full load
  efficiency:
    function: dc_power
    direction: output
    units: '%'
    pins:
    - J1_VIN
    - J1_VOUT
    datasheet_ref: 'Calculated: (VOUT*IOUT)/(VIN*IIN)'
    specs:
    - when:
        vin:
          min: 5.0
          max: 5.0
        load:
          min: 0.5
          max: 0.5
      value: 66
      note: Efficiency at 5V in, 500mA out
pins:
  J1_VIN:
    name: J1.1
    net: VIN_5V
    role: power
    description: 5V power input from bench supply
  J1_GND:
    name: J1.2
    net: GND
    role: ground
    description: Ground return
  J1_VOUT:
    name: J1.3
    net: VOUT_3V3
    role: power
    description: 3.3V regulated output to load
  TP_VIN:
    name: TP1
    net: VIN_5V
    description: Input voltage test point
  TP_VOUT:
    name: TP2
    net: VOUT_3V3
    description: Output voltage test point
  TP_GND:
    name: TP3
    net: GND
    role: ground
    description: Ground reference test point
