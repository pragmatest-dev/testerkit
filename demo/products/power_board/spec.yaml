# Product Specification: Demo Power Board
# A simple LDO-based power board using TLV1117-33 (or similar)
#
# This is a BOARD spec, not an IC spec. It shows:
# - Connector pins (J1) for power input/output
# - Test points (TP) for measurements
# - Board-level characteristics derived from IC specs

product:
  id: power_board
  part_number: "DPB-001"
  name: "Demo Power Board Rev A"
  revision: "A"
  description: "5V to 3.3V LDO regulator board, 800mA max"
  datasheet: "docs/DS-DPB001.pdf"
  schematic: "docs/SCH-DPB001.pdf"

# Physical interface - connector pins and test points
pins:
  # Input connector (J1)
  J1_VIN:
    name: "J1.1"
    net: "VIN_5V"
    role: power
    description: "5V power input from bench supply"
  J1_GND:
    name: "J1.2"
    net: "GND"
    role: ground
    description: "Ground return"
  J1_VOUT:
    name: "J1.3"
    net: "VOUT_3V3"
    role: power
    description: "3.3V regulated output to load"

  # Test points for probing
  TP_VIN:
    name: "TP1"
    net: "VIN_5V"
    description: "Input voltage test point"
  TP_VOUT:
    name: "TP2"
    net: "VOUT_3V3"
    description: "Output voltage test point"
  TP_GND:
    name: "TP3"
    net: "GND"
    role: ground
    description: "Ground reference test point"


# Electrical characteristics
characteristics:
  # Input voltage range (measured at TP_VIN)
  input_voltage:
    function: dc_voltage
    direction: input
    units: V
    pin: TP_VIN
    datasheet_ref: "TLV1117-33 Table 6.3"
    specs:
      - value: 5.0
        accuracy: {absolute: 0.25}
        description: "Operating input range (VOUT+1.4V to 15V)"

  # Quiescent current (measured at J1_VIN with no load)
  quiescent_current:
    function: dc_current
    direction: input
    units: mA
    pin: J1_VIN
    datasheet_ref: "TLV1117-33 Table 6.5"
    specs:
      - conditions:
          load: {min: 0, max: 0}
        value: 5
        description: "Ground current, no load"

  # Output voltage (measured at TP_VOUT)
  output_voltage:
    function: dc_voltage
    direction: output
    units: V
    pin: TP_VOUT
    datasheet_ref: "TLV1117-33 Table 6.5"
    specs:
      - conditions:
          temperature: {min: 25, max: 25}
          load: {min: 0.1, max: 0.1}
        value: 3.3
        accuracy: {pct_reading: 2.0}
        description: "Light load, room temp"
      - conditions:
          temperature: {min: 25, max: 25}
          load: {min: 0.5, max: 0.5}
        value: 3.3
        accuracy: {pct_reading: 2.0}
        description: "Half load"
      - conditions:
          temperature: {min: 25, max: 25}
          load: {min: 0.8, max: 0.8}
        value: 3.3
        accuracy: {pct_reading: 3.0}
        description: "Full load (800mA)"
      - conditions:
          temperature: {min: 85, max: 85}
          load: {min: 0.8, max: 0.8}
        value: 3.3
        accuracy: {pct_reading: 4.0}
        description: "Full load, hot"

  # Load regulation (output change over load range)
  load_regulation:
    function: dc_voltage
    direction: output
    units: mV
    pin: TP_VOUT
    datasheet_ref: "TLV1117-33 Table 6.5"
    specs:
      - conditions:
          load_min: {min: 0.01, max: 0.01}
          load_max: {min: 0.8, max: 0.8}
        value: 5
        description: "VOUT change from 10mA to 800mA"

  # Line regulation (output change over input range)
  line_regulation:
    function: dc_voltage
    direction: output
    units: mV
    pin: TP_VOUT
    datasheet_ref: "TLV1117-33 Table 6.5"
    specs:
      - conditions:
          vin_min: {min: 4.75, max: 4.75}
          vin_max: {min: 10, max: 10}
        value: 3
        description: "VOUT change from 4.75V to 10V input"

  # Output ripple/noise
  output_ripple:
    function: ac_voltage
    direction: output
    units: mV
    pin: TP_VOUT
    datasheet_ref: "Application note"
    conditions:
      bandwidth:
    specs:
      - conditions:
          load: {min: 0.5, max: 0.5}
        value: 25
        description: "Output noise, 10Hz-10MHz"

  # Dropout voltage (VIN - VOUT at regulation limit)
  dropout_voltage:
    function: dc_voltage
    direction: output
    units: V
    pins: [TP_VIN, TP_VOUT]
    datasheet_ref: "TLV1117-33 Table 6.5"
    specs:
      - conditions:
          load: {min: 0.8, max: 0.8}
        value: 1.1
        description: "Dropout at full load"

  # Efficiency (calculated)
  efficiency:
    function: dc_power
    direction: output
    units: "%"
    pins: [J1_VIN, J1_VOUT]
    datasheet_ref: "Calculated: (VOUT*IOUT)/(VIN*IIN)"
    specs:
      - conditions:
          vin: {min: 5.0, max: 5.0}
          load: {min: 0.5, max: 0.5}
        value: 66
        description: "Efficiency at 5V in, 500mA out"
